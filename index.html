  };

  const registrarExito = (id, registro) => {
    setProcessos(ps=>ps.map(p=>{
      if(p.id!==id) return p;
      return {...p, exitos: [...(p.exitos||[]), registro], debito: null};
    }));
    setSelected(s=>{
      if(!s||s.id!==id) return s;
      return {...s, exitos: [...(s.exitos||[]), registro], debito: null};
    });
  };

  const saveAssunto=(id,assunto)=>{
    setProcessos(ps=>ps.map(p=>p.id===id?{...p,assunto}:p));
    setSelected(s=>s&&s.id===id?{...s,assunto}:s);
  };

  const addAndamento=(id, andamento)=>{
    setProcessos(ps=>ps.map(p=>{
      if(p.id!==id) return p;
      const novos=[...(p.andamentos||[]), andamento].sort((a,b)=>a.data.localeCompare(b.data));
      return {...p, andamentos:novos};
    }));
    setSelected(s=>{
      if(!s||s.id!==id) return s;
      const novos=[...(s.andamentos||[]), andamento].sort((a,b)=>a.data.localeCompare(b.data));
      return {...s, andamentos:novos};
    });
  };

  const addTarefaProcesso = (procId, titulo) => {
    if(!setTarefas || !titulo.trim()) return;
    const proc = processos.find(p=>p.id===procId);
    setTarefas(ts=>[...ts, {
      id: Date.now(),
      titulo: titulo.trim(),
      responsavelId: "",
      procId: procId,
      clienteId: proc?.clienteId || "",
      status: "pendente",
      prioridade: "media",
      prazo: "",
      desc: "",
      arquivada: false,
    }]);
  };

  const concluirTarefaProc = tarefaId => {
    if(!setTarefas) return;
    setTarefas(ts=>ts.map(t=>t.id===tarefaId?{...t,status:"concluido"}:t));
  };
  const arquivarTarefaProc = tarefaId => {
    if(!setTarefas) return;
    setTarefas(ts=>ts.map(t=>t.id===tarefaId?{...t,arquivada:true}:t));
  };

  const saveDriveLink = (clienteId, link) => {
    if(!setClientes || !clienteId) return;
    setClientes(cs=>cs.map(c=>c.id===clienteId?{...c,driveLink:link}:c));
  };

  const saveVinculo = (id, vinculo) => {
    setProcessos(ps=>ps.map(p=>p.id===id?{...p,vinculo}:p));
    setSelected(s=>s&&s.id===id?{...s,vinculo}:s);
  };
  const salvarPartes = (id, partes) => {
    const partesResolvidas = resolverClientesDasPartes(partes, clientes, setClientes);
    const parteCliente = partesResolvidas.find(x=>x.clienteId && x.clienteId!==true);
    const autorFinal = nomesPorPolo({partes:partesResolvidas},"autor").join(" e ");
    const reuFinal = nomesPorPolo({partes:partesResolvidas},"reu").join(" e ");
    setProcessos(ps=>ps.map(p=>p.id===id?{...p, partes:partesResolvidas, autor:autorFinal, reu:reuFinal, clienteId: parteCliente?parteCliente.clienteId:p.clienteId}:p));
    setSelected(s=>s&&s.id===id?{...s, partes:partesResolvidas, autor:autorFinal, reu:reuFinal, clienteId: parteCliente?parteCliente.clienteId:s.clienteId}:s);
  };
  const removerVinculo = (id) => {
    setProcessos(ps=>ps.map(p=>p.id===id?{...p,vinculo:null}:p));
    setSelected(s=>s&&s.id===id?{...s,vinculo:null}:s);
  };

  const abrirAnalisePrazo=proc=>{
    const ult=[...(proc.andamentos||[])].sort((a,b)=>b.data.localeCompare(a.data))[0];
    setSugestaoPrazo(detectarPrazo(ult));
    setAnalisandoPrazo(proc);
    setSelected(null);
  };
  const salvarPrazo=info=>{
    const procId = analisandoPrazo.id;
    // Unifica com o sistema de Prazo/Tarefa: além de salvar o "prazoProcessual" (análise
    // detalhada da IA), também atualiza p.prazo/p.prazoAto e sincroniza a tarefa vinculada,
    // para que esse prazo conte em "Prazos e Tarefas" e no calendário/agenda também.
    setProcessos(ps=>{
      const atualizado = ps.map(p=>p.id===procId?{...p, prazoProcessual:info, prazo:info.vencimento||p.prazo, prazoAto:info.proximoAto||p.prazoAto}:p);
      const procNovo = atualizado.find(p=>p.id===procId);
      sincronizarTarefaDoPrazo(procNovo);
      return atualizado;
    });
    if(setAgenda && info.vencimento){
      setAgenda(ag=>{
        const semAntigo = ag.filter(c=>!(c.procId===procId && c._origemPrazo));
        const novoCompromisso = {
          id: Date.now(),
          titulo: `Prazo: ${info.proximoAto}`,
          tipo: "prazo",
          dataHora: `${info.vencimento}T23:59`,
          procId: procId,
          clienteId: analisandoPrazo.clienteId || "",
          responsavelId: "",
          local: "",
          confirmado: true,
          obs: `Parte responsável: ${info.parte}${info.base?` · Base legal: ${info.base}`:""}`,
          _origemPrazo: true,
        };
        return [...semAntigo, novoCompromisso];
      });
    }
    setAnalisandoPrazo(null); setSugestaoPrazo(null);
  };
  const cumprirPrazo=id=>{
    setProcessos(ps=>ps.map(p=>p.id===id?{...p,prazoProcessual:null,status:"em_andamento"}:p));
    setSelected(s=>s&&s.id===id?{...s,prazoProcessual:null,status:"em_andamento"}:s);
    if(setAgenda) setAgenda(ag=>ag.filter(c=>!(c.procId===id && c._origemPrazo)));
  };
  const saveAudiencia=(id, info)=>{
    setProcessos(ps=>ps.map(p=>p.id===id?{...p,audiencia:info}:p));
    setSelected(s=>s&&s.id===id?{...s,audiencia:info}:s);
    if(setAgenda){
      setAgenda(ag=>{
        const semAntiga = ag.filter(c=>!(c.procId===id && c._origemAudiencia));
        if(!info || !info.data) return semAntiga;
        const proc = processos.find(x=>x.id===id);
        const novoCompromisso = {
          id: Date.now(),
          titulo: `Audiência — ${proc?.numero||""}`,
          tipo: "audiencia",
          dataHora: `${info.data}T${info.hora||"00:00"}`,
          procId: id,
          clienteId: proc?.clienteId || "",
          responsavelId: "",
          local: info.local || "",
          confirmado: true,
          obs: "",
          _origemAudiencia: true,
        };
        return [...semAntiga, novoCompromisso];
      });
    }
  };
  const toggleArquivado=(id, arquivado, situacao)=>{
    setProcessos(ps=>ps.map(p=>{
      if(p.id!==id) return p;
      if(!arquivado) return {...p, arquivado:false, situacaoArquivo:null};
      const novaSituacao = situacao || p.situacaoArquivo || null;
      const novoStatus = novaSituacao==="baixado_definitivo" ? "encerrado" : p.status;
      return {...p, arquivado:true, situacaoArquivo: novaSituacao, status: novoStatus};
    }));
    setSelected(s=>{
      if(!s||s.id!==id) return s;
      if(!arquivado) return {...s, arquivado:false, situacaoArquivo:null};
      const novaSituacao = situacao || s.situacaoArquivo || null;
      const novoStatus = novaSituacao==="baixado_definitivo" ? "encerrado" : s.status;
      return {...s, arquivado:true, situacaoArquivo: novaSituacao, status: novoStatus};
    });
  };

  // Atribuição rápida de responsável direto na tabela, sem abrir a ficha completa.
  const atribuirResponsavel = (id, nome) => {
    setProcessos(ps=>ps.map(p=>p.id===id?{...p,responsavel:nome}:p));
    setSelected(s=>s&&s.id===id?{...s,responsavel:nome}:s);
    setAtribuindoRespId(null);
    setRespForm("");
  };

  const atualizarProcesso=async id=>{
    const proc=processos.find(p=>p.id===id);if(!proc)return;
    setUpdateState(s=>({...s,[id]:{loading:true,done:false,novos:0,erro:null}}));
    try{
      const hit=await buscarDataJud(proc.numero);
      const movsCNJ=parsarMovimentos(hit);
      const manuais=(proc.andamentos||[]).filter(a=>a.fonte!=="cnj");
      const datasExist=new Set((proc.andamentos||[]).filter(a=>a.fonte==="cnj").map(a=>a.data+a.desc));
      const novos=movsCNJ.filter(m=>!datasExist.has(m.data+m.desc)).length;
      const andamentosMesclados=[...manuais,...movsCNJ].sort((a,b)=>a.data.localeCompare(b.data));
      setProcessos(ps=>ps.map(p=>p.id===id?{...p,andamentos:andamentosMesclados}:p));
      setSelected(s=>s&&s.id===id?{...s,andamentos:andamentosMesclados}:s);
      setUpdateState(s=>({...s,[id]:{loading:false,done:true,novos,erro:null,ultimaVez:new Date()}}));
    }catch(e){
      const msg = (e && e.message) ? e.message : `Erro inesperado: ${String(e)}`;
      setUpdateState(s=>({...s,[id]:{loading:false,done:false,novos:0,erro:msg}}));
    }
  };

  const confirmarMovColadas = (novosAndamentos) => {
    if(!colandoMovPara || novosAndamentos.length===0){ setColandoMovPara(null); return; }
    const id = colandoMovPara.id;
    setProcessos(ps=>ps.map(p=>{
      if(p.id!==id) return p;
      const mesclados = [...(p.andamentos||[]), ...novosAndamentos].sort((a,b)=>(a.data||"").localeCompare(b.data||""));
      return {...p, andamentos: mesclados};
    }));
    setSelected(s=>{
      if(!s||s.id!==id) return s;
      const mesclados = [...(s.andamentos||[]), ...novosAndamentos].sort((a,b)=>(a.data||"").localeCompare(b.data||""));
      return {...s, andamentos: mesclados};
    });
    setColandoMovPara(null);
  };

  // Problema 2/3: ao marcar/alterar a data do "Prazo" do processo, cria ou atualiza
  // automaticamente um Prazo/Tarefa vinculado (com o ato pendente já nomeado), e
  // como a tarefa nasce com procId preenchido, ela já aparece cruzada em ambas as páginas.
  const sincronizarTarefaDoPrazo = (procAtualizado) => {
    if(!setTarefas) return;
    setTarefas(ts=>{
      const existente = ts.find(t=>t.origemPrazoProcId===procAtualizado.id);
      if(!procAtualizado.prazo){
        if(existente) return ts.map(t=>t.id===existente.id?{...t,arquivada:true}:t);
        return ts;
      }
      const dias = diasRest(procAtualizado.prazo);
      const prioridade = dias<=3 ? "alta" : dias<=7 ? "media" : "baixa";
      if(existente){
        return ts.map(t=>t.id===existente.id?{...t,
          titulo: procAtualizado.prazoAto || t.titulo,
          prazo: procAtualizado.prazo,
          prioridade,
          procId: procAtualizado.id,
          clienteId: procAtualizado.clienteId || t.clienteId,
          arquivada: false,
        }:t);
      }
      return [...ts, {
        id: Date.now(),
        titulo: procAtualizado.prazoAto || `Prazo do processo ${procAtualizado.numero}`,
        responsavelId: "",
        procId: procAtualizado.id,
        clienteId: procAtualizado.clienteId || "",
        status: "pendente",
        prioridade,
        prazo: procAtualizado.prazo,
        desc: "Gerado automaticamente a partir do prazo marcado no processo.",
        arquivada: false,
        origemPrazoProcId: procAtualizado.id,
      }];
    });
  };

  const salvarPrazoDoProcesso = (procId, prazo, ato) => {
    setProcessos(ps=>{
      const atualizado = ps.map(x=>x.id===procId?{...x,prazo,prazoAto:ato}:x);
      const procNovo = atualizado.find(x=>x.id===procId);
      sincronizarTarefaDoPrazo(procNovo);
      return atualizado;
    });
    setSelected(s=>s&&s.id===procId?{...s,prazo,prazoAto:ato}:s);
  };

  // Marca o prazo do processo como cumprido: limpa o prazo/ato do processo e conclui
  // a tarefa vinculada (se houver), sem precisar abrir a ficha completa do processo.
  const marcarPrazoCumprido = (procId) => {
    setProcessos(ps=>ps.map(p=>p.id===procId?{...p, prazo:"", prazoAto:""}:p));
    setSelected(s=>s&&s.id===procId?{...s, prazo:"", prazoAto:""}:s);
    if(setTarefas){
      setTarefas(ts=>ts.map(t=>t.origemPrazoProcId===procId?{...t,status:"concluido"}:t));
    }
  };

  const urgentes=processos.filter(isUrgProc);
  const prazosVencidos=processos.filter(p=>p.prazoProcessual?.ativo&&p.prazoProcessual?.vencimento&&diasRest(p.prazoProcessual.vencimento)<0);
  const prazosUrgentes=processos.filter(p=>p.prazoProcessual?.ativo&&p.prazoProcessual?.vencimento&&diasRest(p.prazoProcessual.vencimento)>=0&&diasRest(p.prazoProcessual.vencimento)<=3);

  // Cartões de indicadores no topo (unifica processo.prazo, já sincronizado com Prazos e Tarefas)
  const processosNaoEncerrados = processos.filter(p=>normalizarStatus(p.status)!=="encerrado" && !p.arquivado);
  const kpiPrazoVencido = processosNaoEncerrados.filter(p=>p.prazo && diasRest(p.prazo)<0).length;
  const kpiPrazoProximo = processosNaoEncerrados.filter(p=>p.prazo && diasRest(p.prazo)>=0 && diasRest(p.prazo)<=7).length;
  const kpiAguardandoProvidencia = processosNaoEncerrados.filter(p=>normalizarStatus(p.status)==="pendencia_documentos").length;
  const kpiEmAndamento = processosNaoEncerrados.length;

  const statusGrupos=STATUS_VALIDOS.map(k=>({key:k,label:SC[k].label}));
  const cnt=s=>processos.filter(p=>normalizarStatus(p.status)===s).length;

  const anosDisponiveis = useMemo(()=>{
    const anos = new Set();
    processos.forEach(p=>{ const m=(p.numero||"").match(/\.(\d{4})\./); if(m) anos.add(m[1]); });
    return Array.from(anos).sort((a,b)=>b.localeCompare(a));
  },[processos]);
  const varasDisponiveis = useMemo(()=>{
    const varas = new Set();
    processos.forEach(p=>{ if(p.vara) varas.add(p.vara); });
    return Array.from(varas).sort();
  },[processos]);
  const responsaveisDisponiveis = useMemo(()=>{
    const resp = new Set();
    processos.forEach(p=>{ if(p.responsavel) resp.add(p.responsavel); });
    return Array.from(resp).sort();
  },[processos]);
  const todasClassificacoes = [...CLASSIFICACOES_VALIDAS, ...(classificacoesCustom||[])];

  const filtrosAtivos = [filtroCliente,filtroAno,filtroClassificacao,filtroSistema,filtroVara,filtroResponsavel].filter(Boolean).length;
  const limparFiltros = () => { setFiltroCliente("");setFiltroAno("");setFiltroClassificacao("");setFiltroSistema("");setFiltroVara("");setFiltroResponsavel(""); };

  const lista=useMemo(()=>{
    const q=busca.toLowerCase();
    return processos.filter(p=>{
      // Os cartões de indicadores funcionam como filtro próprio: quando ativos,
      // ignoram a aba de status normal (um prazo vencido pode estar em qualquer status).
      if(filtroKpi){
        const naoEncerrado = normalizarStatus(p.status)!=="encerrado" && !p.arquivado;
        if(!naoEncerrado) return false;
        const d = p.prazo ? diasRest(p.prazo) : null;
        if(filtroKpi==="vencidos" && !(d!==null && d<0)) return false;
        if(filtroKpi==="proximos" && !(d!==null && d>=0 && d<=7)) return false;
        if(filtroKpi==="aguardando" && normalizarStatus(p.status)!=="pendencia_documentos") return false;
        if(filtroKpi==="andamento" && normalizarStatus(p.status)!=="em_andamento") return false;
      } else {
        if(normalizarStatus(p.status)!==aba) return false;
      }
      if(q && !(p.numero.includes(q)||p.autor.toLowerCase().includes(q)||p.reu.toLowerCase().includes(q)||(p.responsavel||"").toLowerCase().includes(q))) return false;
      if(filtroCliente && String(p.clienteId)!==filtroCliente) return false;
      if(filtroAno){ const m=(p.numero||"").match(/\.(\d{4})\./); if(!m || m[1]!==filtroAno) return false; }
      if(filtroClassificacao && p.classificacao!==filtroClassificacao) return false;
      if(filtroSistema && p.sistema!==filtroSistema) return false;
      if(filtroVara && p.vara!==filtroVara) return false;
      if(filtroResponsavel && p.responsavel!==filtroResponsavel) return false;
      return true;
    });
  },[processos,aba,busca,filtroCliente,filtroAno,filtroClassificacao,filtroSistema,filtroVara,filtroResponsavel,filtroKpi]);

  // Ordenação clicável das colunas da tabela de processos
  const [ordenacao, setOrdenacao] = useState({campo:null, direcao:"asc"});
  const ultimoMovDe = p => [...(p.andamentos||[])].sort((a,b)=>b.data.localeCompare(a.data))[0]?.data || "";
  const comparadores = {
    nome: (a,b) => clientePrincipalEAdversa(a,clientes).nomeCliente.localeCompare(clientePrincipalEAdversa(b,clientes).nomeCliente,"pt-BR"),
    cliente: (a,b) => (clienteDe(a)?.nome||"").localeCompare(clienteDe(b)?.nome||"","pt-BR"),
    acao: (a,b) => (CC[a.classificacao]?.label||a.classificacao||"").localeCompare(CC[b.classificacao]?.label||b.classificacao||"","pt-BR"),
    proximaAcao: (a,b) => (a.prazoAto||"").localeCompare(b.prazoAto||"","pt-BR"),
    responsavel: (a,b) => (a.responsavel||"").localeCompare(b.responsavel||"","pt-BR"),
    // itens com prazo aparecem primeiro (ordenados pela data mais próxima); sem prazo ficam por último
    prazo: (a,b) => { if(a.prazo && b.prazo) return a.prazo.localeCompare(b.prazo); if(a.prazo) return -1; if(b.prazo) return 1; return 0; },
    ultimoMov: (a,b) => ultimoMovDe(b).localeCompare(ultimoMovDe(a)), // mais recente primeiro por padrão
    status: (a,b) => (SC[normalizarStatus(a.status)]?.label||"").localeCompare(SC[normalizarStatus(b.status)]?.label||"","pt-BR"),
  };
  const alternarOrdenacao = campo => {
    setOrdenacao(o => o.campo===campo ? {campo, direcao: o.direcao==="asc"?"desc":"asc"} : {campo, direcao:"asc"});
  };
  const listaOrdenada = useMemo(()=>{
    if(!ordenacao.campo || !comparadores[ordenacao.campo]) return lista;
    const arr = [...lista].sort(comparadores[ordenacao.campo]);
    if(ordenacao.direcao==="desc") arr.reverse();
    return arr;
  },[lista, ordenacao, clientes]);

  const salvar=form=>{
    // Resolve o(s) marcador(es) "É o cliente" — tanto no modo de múltiplas partes
    // quanto no modo simples (autor/reu) — sincronizando com cliente existente ou criando um novo.
    let formResolvido = form;
    if(form.partes && form.partes.length){
      const partesResolvidas = resolverClientesDasPartes(form.partes, clientes, setClientes);
      const parteCliente = partesResolvidas.find(x=>x.clienteId && x.clienteId!==true);
      formResolvido = {...form, partes: partesResolvidas, clienteId: parteCliente ? parteCliente.clienteId : form.clienteId};
    } else if(form.autorEhCliente || form.reuEhCliente){
      const sintetico = [
        {nome: form.autor, clienteId: form.autorEhCliente ? true : null},
        {nome: form.reu, clienteId: form.reuEhCliente ? true : null},
      ].filter(x=>x.nome && x.nome.trim());
      const resolvido = resolverClientesDasPartes(sintetico, clientes, setClientes);
      const parteCliente = resolvido.find(x=>x.clienteId && x.clienteId!==true);
      formResolvido = {...form, clienteId: parteCliente ? parteCliente.clienteId : form.clienteId};
    }
    const salvo = formResolvido.id ? formResolvido : {...formResolvido,id:Date.now(),andamentos:[],documentos:[]};
    setProcessos(ps=>formResolvido.id?ps.map(p=>p.id===formResolvido.id?formResolvido:p):[...ps,salvo]);
    sincronizarTarefaDoPrazo(salvo);
    setEditando(null);setNovo(false);
  };
  const hdr={fontSize:11,textTransform:"uppercase",letterSpacing:".5px",color:"var(--text2)",fontWeight:600};
  const btnLote={fontSize:11,fontWeight:600,padding:"6px 11px",borderRadius:5,border:"none",background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",whiteSpace:"nowrap"};
  const btnIcon={fontSize:13,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",borderRadius:6,border:"1px solid var(--border1)",background:"#fff",padding:0,lineHeight:1};

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:18,gap:16,flexWrap:"wrap"}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:700,color:"var(--text1)",margin:"0 0 4px",letterSpacing:"-.015em"}}>Processos</h1>
          <p style={{fontSize:12,fontWeight:400,color:"var(--text2)",margin:0}}>{processos.length} processo(s) cadastrados</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{position:"relative"}}>
            <Icon name="search" size={14} color="var(--text3)" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}/>
            <input placeholder="Buscar processo, cliente, parte ou número…" value={busca} onChange={e=>setBusca(e.target.value)} style={{fontSize:12.5,padding:"9px 14px 9px 32px",borderRadius:8,border:"1px solid var(--border2)",background:"#fff",color:"var(--text1)",width:290}}/>
          </div>
          <button onClick={()=>setFiltrosAbertos(v=>!v)} style={{...btnSec,display:"flex",alignItems:"center",gap:7,fontWeight:600,borderColor:filtrosAtivos>0?"var(--accent)":"var(--border2)",color:filtrosAtivos>0?"var(--accent)":"var(--text1)"}}>
            <Icon name="filter" size={14}/>Filtros{filtrosAtivos>0&&<span style={{background:"var(--accent)",color:"#fff",borderRadius:8,padding:"0 6px",fontSize:9.5}}>{filtrosAtivos}</span>}

}
function PaginaRelatorios({processos,parcelas,clientes}){
  const [clienteSel,setClienteSel]=useState("");
  const [preview,setPreview]=useState(false);
  const clienteObj = clientes.find(c=>String(c.id)===String(clienteSel));
  const clienteData=useMemo(()=>{if(!clienteSel)return null;return{procs:processos.filter(p=>String(p.clienteId)===String(clienteSel)),parts:parcelas.filter(p=>clienteObj&&p.cliente===clienteObj.nome)};},[clienteSel,processos,parcelas,clienteObj]);
  const gerarCorpoEmail=()=>{
    if(!clienteData||!clienteObj)return"";
    const{procs,parts}=clienteData;
    const mes=hoje.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
    let txt=`Prezado(a) ${clienteObj.nome},\n\nSegue o relatório mensal dos seus processos referente a ${mes}.\n\n━━ PROCESSOS ━━\n\n`;
    procs.forEach(p=>{
      txt+=`📋 Processo: ${p.numero}\n   Ação: ${p.autor} vs. ${p.reu}\n   Vara: ${p.vara}\n   Status: ${SC[normalizarStatus(p.status)]?.label}${isUrgProc(p)?` ⚠️ PRAZO EM ${diasRest(p.prazo)} DIAS`:""}\n   Próximo prazo: ${fmtData(p.prazo)}\n`;
      if(p.debito?.valor) txt+=`   💰 Débito atualizado: ${fmtBRL(p.debito.valor)}\n`;
      if(p.prazoProcessual?.ativo){const d=diasRest(p.prazoProcessual.vencimento);txt+=`   ⏱ Próximo ato: ${p.prazoProcessual.proximoAto} — ${p.prazoProcessual.parte} — vence ${fmtData(p.prazoProcessual.vencimento)} (${d<0?`${Math.abs(d)}d vencido`:d+"d restantes"})\n`;}
      const ands=[...(p.andamentos||[])].sort((a,b)=>b.data.localeCompare(a.data));
      if(ands[0])txt+=`   Último ato: ${fmtData(ands[0].data)} — ${ands[0].desc}\n`;
      txt+="\n";
    });
    if(parts.length){
      txt+=`━━ FINANCEIRO ━━\n\n`;
      const pago=parts.filter(x=>x.pago).reduce((a,x)=>a+x.valor,0);
      const aberto=parts.filter(x=>!x.pago).reduce((a,x)=>a+x.valor,0);
      txt+=`Total pago: ${fmtBRL(pago)}\nSaldo em aberto: ${fmtBRL(aberto)}\n\n`;
      const prox=parts.filter(x=>!x.pago).sort((a,b)=>new Date(a.vencimento)-new Date(b.vencimento)).slice(0,3);
      if(prox.length){txt+=`Próximas parcelas:\n`;prox.forEach(x=>txt+=`   • Parcela ${x.parcela}/${x.totalParcelas} — ${fmtBRL(x.valor)} — ${fmtData(x.vencimento)}\n`);}
      txt+="\n";
    }
    txt+=`Qualquer dúvida, estamos à disposição.\n\nAtenciosamente,\nMichelli Abreu Advocacia`;
    return txt;
  };
  const abrirGmail=()=>{if(!clienteData||!clienteObj)return;const mes=hoje.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(clienteObj.email||"")}&su=${encodeURIComponent(`Relatório Mensal — ${clienteObj.nome} — ${mes}`)}&body=${encodeURIComponent(gerarCorpoEmail())}`,"_blank");};
  const hdr={fontSize:10,textTransform:"uppercase",letterSpacing:".6px",color:"var(--text2)",fontWeight:700};
  return(
    <div>
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:700,color:"var(--text1)",margin:"0 0 3px",letterSpacing:"-.02em"}}>Relatórios</h1>

          <div style={{flex:1,minWidth:200}}><span style={lbl}>Selecione o cliente</span><select value={clienteSel} onChange={e=>setClienteSel(e.target.value)} style={{...inp,padding:"8px 10px"}}><option value="">Selecione…</option>{[...clientes].sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR")).map(c=><option key={c.id} value={c.id}>{c.nome}{c.email?` — ${c.email}`:""}</option>)}</select></div>

            <button onClick={()=>setPreview(!preview)} disabled={!clienteSel} style={{...btnSec,opacity:clienteSel?1:.5}}>👁 Pré-visualizar</button>

          </div>
        </div>
        {clienteSel&&!clienteObj?.email&&<p style={{fontSize:11,color:"var(--amber)",margin:"8px 0 0"}}>⚠ Este cliente não possui e-mail cadastrado. Edite o cliente no CRM para habilitar o envio.</p>}

function PaginaIntimacoes({intimacoes, setIntimacoes, processos, setProcessos, equipe, setTarefas, onAbrirProcesso}){

  const lista = useMemo(()=>{
    return (intimacoes||[]).filter(i=>{
      if(filtro==="novas") return !i.lida;

      if(filtro==="arquivadas") return i.arquivada;
      return true;
    }).sort((a,b)=>(b.dataDisponibilizacao||"").localeCompare(a.dataDisponibilizacao||""));
  },[intimacoes,filtro]);

  const marcarLida = id => setIntimacoes(is=>is.map(i=>i.id===id?{...i,lida:true}:i));
  const arquivar = id => setIntimacoes(is=>is.map(i=>i.id===id?{...i,arquivada:true,lida:true}:i));

  const vincularProcesso = (intimacaoId, procId) => {
    setIntimacoes(is=>is.map(i=>i.id===intimacaoId?{...i,procId:procId?parseInt(procId):null}:i));
  };

  const confirmarPrazo = (info) => {
    const procId = criandoPrazoPara.procId;
    if(procId){
      setProcessos(ps=>ps.map(p=>p.id===procId?{...p,prazoProcessual:info}:p));
    }
    marcarLida(criandoPrazoPara.id);
    setCriandoPrazoPara(null);
  };

  const confirmarTarefa = (dados) => {
    if(setTarefas){
      setTarefas(ts=>[...ts, {
        id: Date.now(), titulo: dados.titulo, responsavelId: dados.responsavelId,
        procId: criandoTarefaPara.procId || "", clienteId: "",

    }

        <div style={{display:"flex",gap:0}}>
          {[["novas","Novas"],["lidas","Lidas"],["arquivadas","Arquivadas"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFiltro(v)} style={{background:"none",border:"none",borderBottom:filtro===v?"2px solid var(--navy2)":"2px solid transparent",color:filtro===v?"var(--navy2)":"var(--text2)",padding:"5px 12px 7px",fontSize:11,fontWeight:filtro===v?700:500,cursor:"pointer",textTransform:"uppercase",letterSpacing:".5px"}}>{l}</button>
          ))}
        </div>
      </div>
      {lista.length===0?(
        <div style={{background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"2.5rem",textAlign:"center",color:"var(--text2)",fontSize:13}}>Nenhuma intimação nesta aba.</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {lista.map(i=>{
            const proc = processos.find(p=>p.id===i.procId);
            return (
              <div key={i.id} style={{background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"14px 16px",opacity:i.lida&&filtro==="novas"?0.6:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:10}}>
                  <div>
                    <p style={{fontSize:12,fontWeight:700,margin:"0 0 2px",color:"var(--navy)"}}>{i.orgao||"Tribunal"}</p>
                    <p style={{fontSize:10.5,color:"var(--text2)",margin:0}}>{fmtData(i.dataDisponibilizacao)}</p>
                  </div>
                  {!i.lida&&<Pill bg="var(--accent-light)" color="var(--accent)" label="Nova" sm/>}
                </div>
                <p style={{fontSize:12.5,color:"var(--text1)",margin:"0 0 10px",lineHeight:1.5}}>{i.texto || i.teor}</p>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  <select value={i.procId||""} onChange={e=>vincularProcesso(i.id, e.target.value)} style={{...inp,padding:"5px 8px",fontSize:11,width:220}}>
                    <option value="">Vincular a um processo…</option>
                    {processos.map(p=><option key={p.id} value={p.id}>{p.numero}</option>)}
                  </select>
                  {proc&&<button onClick={()=>onAbrirProcesso(proc)} style={{...btnSec,fontSize:10.5,padding:"5px 10px"}}>Ver processo</button>}
                  <button onClick={()=>setCriandoPrazoPara(i)} style={{...btnSec,fontSize:10.5,padding:"5px 10px"}}>⏱ Criar prazo</button>
                  <button onClick={()=>setCriandoTarefaPara(i)} style={{...btnSec,fontSize:10.5,padding:"5px 10px"}}>✓ Criar tarefa</button>
                  {!i.lida&&<button onClick={()=>marcarLida(i.id)} style={{...btnSec,fontSize:10.5,padding:"5px 10px"}}>Marcar como lida</button>}
                  {!i.arquivada&&<button onClick={()=>arquivar(i.id)} style={{...btnSec,fontSize:10.5,padding:"5px 10px",color:"var(--text2)"}}>📦 Arquivar</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {criandoPrazoPara&&<ModalCriarPrazoIntimacao intimacao={criandoPrazoPara} onConfirm={confirmarPrazo} onClose={()=>setCriandoPrazoPara(null)}/>}
      {criandoTarefaPara&&<ModalCriarTarefaIntimacao intimacao={criandoTarefaPara} equipe={equipe||[]} onConfirm={confirmarTarefa} onClose={()=>setCriandoTarefaPara(null)}/>}
    </div>
  );
}

function fmtDataHoraCurta(s){
  if(!s) return "—";
  const d = new Date(s);
  const hojeStr = hoje.toISOString().slice(0,10);
  const dStr = d.toISOString().slice(0,10);
  const hora = d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  if(dStr===hojeStr) return `Hoje, ${hora}`;
  return `${d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}, ${hora}`;
}

function ModalExecutarTarefaIA({tarefa, processo, cliente, onClose, onConcluir}){
  const [textoAnexado, setTextoAnexado] = useState("");
  const [instrucoes, setInstrucoes] = useState("");
  const [gerando, setGerando] = useState(false);
  const [erro, setErro] = useState("");
  const [resultado, setResultado] = useState("");

  const lerArquivo = (e) => {
    const arquivo = e.target.files?.[0];
    if(!arquivo) return;
    if(!arquivo.type.startsWith("text/") && !arquivo.name.endsWith(".txt")){
      setErro("Só é possível ler o texto de arquivos .txt diretamente aqui. Para PDF/Word, abra o arquivo, copie o texto e cole no campo abaixo.");
      return;
    }
    const reader = new FileReader();
    reader.onload = () => setTextoAnexado(t => t ? t+"\n\n"+reader.result : String(reader.result));
    reader.readAsText(arquivo);
  };

  const gerar = async () => {
    setErro(""); setGerando(true); setResultado("");
    try {
      const contexto = [
        `Ato/tarefa a realizar: ${tarefa.titulo}`,
        processo ? `Processo: ${processo.numero} — ${processo.autor} vs. ${processo.reu}${processo.vara?` — ${processo.vara}`:""}` : "",
        cliente ? `Cliente: ${cliente.nome}` : "",
        tarefa.prazo ? `Prazo: ${fmtData(tarefa.prazo)}` : "",
        tarefa.desc ? `Observações da tarefa: ${tarefa.desc}` : "",
        instrucoes ? `Instruções adicionais da advogada: ${instrucoes}` : "",
        textoAnexado ? `\n--- Conteúdo do documento anexado ---\n${textoAnexado}` : "",
      ].filter(Boolean).join("\n");

      let res;
      try {
        res = await fetch(IA_PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_KEY },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 4000,
            system: `Você é um assistente jurídico que ajuda uma advogada brasileira a redigir a peça/documento necessário para cumprir um prazo ou executar uma tarefa. Use o contexto fornecido (processo, cliente, prazo, documento anexado e instruções) para produzir um rascunho completo, bem estruturado e no padrão da prática jurídica brasileira. Se faltar alguma informação essencial, sinalize isso claramente no início do texto em vez de inventar fatos. Este é um rascunho de apoio — a advogada revisará antes de protocolar.`,
            messages: [{role:"user", content: contexto}]
          })
        });
      } catch(e) {
        throw new Error("Não foi possível conectar ao serviço de IA — verifique sua conexão com a internet.");
      }
      if(!res.ok){
        let detalhe = "";
        try { const errBody = await res.json(); detalhe = errBody?.error?.message || ""; } catch(_){}
        throw new Error(`Erro HTTP ${res.status} ao chamar a IA.${detalhe?` Detalhe: ${detalhe}`:""}`);
      }
      const data = await res.json();
      const txt = data.content?.find(b=>b.type==="text")?.text || "";
      if(!txt) throw new Error("A IA retornou uma resposta vazia.");
      setResultado(txt);
    } catch(e) {
      setErro(e.message || "Não foi possível gerar o rascunho.");
    }
    setGerando(false);
  };

  const copiar = () => {
    if(navigator.clipboard && resultado) navigator.clipboard.writeText(resultado).catch(()=>{});
  };

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(15,38,69,.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{background:"#fff",width:640,maxWidth:"100%",maxHeight:"90vh",overflow:"auto",borderRadius:10,padding:"1.5rem",boxShadow:"0 20px 50px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <p style={{fontSize:10,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".7px",margin:"0 0 4px",fontWeight:600}}>✨ Executar com IA</p>
            <p style={{fontSize:15,fontWeight:700,margin:0,color:"var(--navy)"}}>{tarefa.titulo}</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:4}}>
              {cliente && <span style={{fontSize:11.5,color:"var(--text2)"}}>👤 {cliente.nome}</span>}
              {processo && <span style={{fontSize:11.5,color:"var(--text2)"}}>📋 {processo.numero}</span>}
              {tarefa.prazo && <span style={{fontSize:11.5,color:"var(--text2)"}}>📅 {fmtData(tarefa.prazo)}</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"var(--text2)",padding:0,lineHeight:1}}>×</button>
        </div>

        {!resultado && (
          <>
            <div style={{marginBottom:12}}>
              <span style={lbl}>Anexar documento (opcional)</span>
              <input type="file" accept=".txt,text/plain" onChange={lerArquivo} style={{fontSize:12,marginBottom:8}}/>
              <p style={{fontSize:10.5,color:"var(--text3)",margin:"0 0 8px"}}>Só arquivos .txt são lidos automaticamente aqui. Para PDF/Word, abra o arquivo, copie o conteúdo e cole no campo abaixo.</p>
              <textarea value={textoAnexado} onChange={e=>setTextoAnexado(e.target.value)} placeholder="Cole aqui o conteúdo do documento (petição inicial, intimação, contrato, etc.)…" style={{width:"100%",minHeight:120,fontSize:12,padding:"10px",borderRadius:6,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}/>
            </div>
            <div style={{marginBottom:14}}>
              <span style={lbl}>Instruções adicionais (opcional)</span>
              <textarea value={instrucoes} onChange={e=>setInstrucoes(e.target.value)} placeholder="Ex: focar na tese de excesso de execução, usar tom mais formal, etc." style={{width:"100%",minHeight:60,fontSize:12,padding:"10px",borderRadius:6,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}/>
            </div>
            {erro && <p style={{fontSize:12,color:"var(--red)",marginBottom:12}}>{erro}</p>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={btnSec}>Fechar</button>
              <button onClick={gerar} disabled={gerando} style={{...btnPri,opacity:gerando?.7:1}}>{gerando?"Gerando…":"✨ Gerar rascunho"}</button>
            </div>
          </>
        )}

        {resultado && (
          <>
            <div style={{background:"var(--accent-light)",border:"1px solid #C5DCF2",borderRadius:6,padding:"8px 12px",marginBottom:10,fontSize:11.5,color:"var(--navy2)"}}>
              ✨ Rascunho gerado pela IA — revise com atenção antes de usar/protocolar.
            </div>
            <textarea value={resultado} onChange={e=>setResultado(e.target.value)} style={{width:"100%",minHeight:320,fontSize:12.5,padding:"12px",borderRadius:6,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.6,marginBottom:12}}/>
            <div style={{display:"flex",gap:8,justifyContent:"space-between",flexWrap:"wrap"}}>
              <button onClick={()=>setResultado("")} style={btnSec}>← Gerar de novo</button>
              <div style={{display:"flex",gap:8}}>
                <button onClick={copiar} style={btnSec}>📋 Copiar</button>
                <button onClick={()=>{ onConcluir(tarefa.id); onClose(); }} style={{...btnPri,background:"var(--green)"}}>✓ Marcar tarefa como concluída</button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function ModalFormTarefa({tarefa, processos, clientes, equipe, onSave, onClose}){
  const e0 = {titulo:"",responsavelId:"",procId:"",clienteId:"",status:"pendente",prioridade:"media",prazo:"",desc:""};
  const [f,setF] = useState(tarefa||e0);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(15,38,69,.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{background:"#fff",width:460,maxWidth:"100%",maxHeight:"90vh",overflow:"auto",borderRadius:10,padding:"1.75rem",boxShadow:"0 25px 60px rgba(0,0,0,.3)"}}>
        <p style={{fontSize:15,fontWeight:700,margin:"0 0 18px",color:"var(--navy)"}}>{tarefa?"Editar prazo/tarefa":"Novo prazo/tarefa"}</p>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><span style={lbl}>Título</span><input value={f.titulo} onChange={e=>s("titulo",e.target.value)} style={inp} placeholder="Ex: Elaborar contestação, protocolar recurso…"/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><span style={lbl}>Responsável <span style={{color:"var(--text3)",fontWeight:400,textTransform:"none"}}>(opcional)</span></span>
              <select value={f.responsavelId||""} onChange={e=>s("responsavelId",e.target.value)} style={{...inp,padding:"7px 8px"}}>
                <option value="">—</option>
                {(equipe||[]).map(m=><option key={m.id} value={m.id}>{m.nome}</option>)}
              </select>
            </div>
            <div><span style={lbl}>Prioridade</span>
              <select value={f.prioridade} onChange={e=>s("prioridade",e.target.value)} style={{...inp,padding:"7px 8px"}}>
                {Object.entries(PRIORIDADE_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><span style={lbl}>Processo vinculado <span style={{color:"var(--text3)",fontWeight:400,textTransform:"none"}}>(opcional)</span></span>
              <select value={f.procId||""} onChange={e=>{
                const procId = e.target.value;
                const proc = processos.find(p=>String(p.id)===procId);
                setF(x=>({...x, procId, clienteId: proc?.clienteId || x.clienteId}));
              }} style={{...inp,padding:"7px 8px"}}>
                <option value="">—</option>
                {processos.map(p=><option key={p.id} value={p.id}>{p.numero}</option>)}
              </select>
            </div>
            <div><span style={lbl}>Prazo/vencimento <span style={{color:"var(--text3)",fontWeight:400,textTransform:"none"}}>(opcional)</span></span><input type="date" value={f.prazo||""} onChange={e=>s("prazo",e.target.value)} style={inp}/></div>
          </div>
          <div><span style={lbl}>Status</span>
            <select value={f.status} onChange={e=>s("status",e.target.value)} style={{...inp,padding:"7px 8px"}}>
              {STATUS_TAREFA_VALIDOS.map(k=><option key={k} value={k}>{STATUS_TAREFA_CFG[k].label}</option>)}
            </select>
          </div>
          <div><span style={lbl}>Observações <span style={{color:"var(--text3)",fontWeight:400,textTransform:"none"}}>(opcional)</span></span><textarea value={f.desc||""} onChange={e=>s("desc",e.target.value)} style={{...inp,minHeight:60,resize:"vertical"}}/></div>
        </div>
        <div style={{marginTop:20,display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnSec}>Cancelar</button>
          <button onClick={()=>{
            if(!f.titulo.trim()){ alert("Informe o título do prazo/tarefa."); return; }
            onSave(f);
          }} style={btnPri}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

function CardTarefaKanban({t, processos, clientes, equipe, atrasada, onAbrirProcesso, onEditar, onArquivar, onExcluir, onExecutar, onVerRapido, onDragStart}){
  const pCfg = PRIORIDADE_CFG[t.prioridade]||PRIORIDADE_CFG.media;
  const respNome = id => (equipe||[]).find(m=>String(m.id)===String(id))?.nome || "";
  const procNum = id => processos.find(p=>String(p.id)===String(id))?.numero || "";
  const nomeCliente = (()=>{
    if(t.clienteId){ const c=(clientes||[]).find(x=>String(x.id)===String(t.clienteId)); if(c) return c.nome; }
    if(t.procId){ const proc=processos.find(p=>String(p.id)===String(t.procId)); if(proc?.clienteId){ const c=(clientes||[]).find(x=>x.id===proc.clienteId); if(c) return c.nome; } }
    return null;
  })();
  const naoCumprido = t.status !== "concluido";
  const dias = t.prazo ? diasRest(t.prazo) : null;
  return (
    <div
      draggable
      onDragStart={e=>onDragStart(e, t.id)}
      style={{background:"#fff",border:`1px solid ${atrasada?"#F3B8B8":"var(--border1)"}`,borderRadius:8,padding:"11px 12px",marginBottom:8,cursor:"grab",boxShadow:"0 1px 2px rgba(15,17,23,.04)"}}
    >
      <div onClick={()=>onVerRapido(t)} style={{cursor:"pointer"}}>
        {nomeCliente && <p style={{fontSize:16,fontWeight:800,color:"var(--navy)",margin:"0 0 5px",letterSpacing:"-.2px"}}>{nomeCliente}</p>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6,marginBottom:6}}>
          <p style={{fontSize:14.5,fontWeight:700,color:"var(--text1)",margin:0,lineHeight:1.3}}>{t.titulo}</p>
          <Pill bg={pCfg.bg} color={pCfg.color} label={pCfg.label} sm/>
        </div>
      </div>
      {t.origemPrazoProcId && <div style={{marginBottom:6}}><Pill bg="var(--accent-light)" color="var(--accent)" label="Prazo do processo" sm/></div>}
      <div style={{display:"flex",flexDirection:"column",gap:3,fontSize:10.5,color:"var(--text2)",marginBottom:8}}>
        {t.procId && <span onClick={()=>{const p=processos.find(x=>String(x.id)===String(t.procId));if(p)onAbrirProcesso(p);}} style={{cursor:"pointer",textDecoration:"underline"}}>📋 {procNum(t.procId)}</span>}
        {t.responsavelId && <span>🧑‍💼 {respNome(t.responsavelId)}</span>}
        {t.prazo && (
          <div style={{marginTop:2,display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:11.5,fontWeight:naoCumprido?700:400,color:naoCumprido?"var(--red)":"var(--text2)"}}>📅 {fmtData(t.prazo)}</span>
            {naoCumprido && dias!==null && (
              <span style={{fontSize:9.5,color:"var(--text3)",fontWeight:400}}>
                {dias<0?`atrasado há ${Math.abs(dias)}d`:dias===0?"vence hoje":`faltam ${dias}d`}
              </span>
            )}
          </div>
        )}
      </div>
      {t.status!=="concluido" && (
        <button onClick={()=>onExecutar(t)} style={{width:"100%",fontSize:11.5,padding:"7px 0",cursor:"pointer",borderRadius:6,border:"none",background:"var(--navy2)",color:"#fff",fontWeight:600,marginBottom:7}}>✨ Executar com IA</button>
      )}
      <div style={{display:"flex",gap:6,borderTop:"1px solid var(--border1)",paddingTop:7}}>
        <button onClick={()=>onEditar(t)} style={{fontSize:10,padding:"3px 9px",cursor:"pointer",borderRadius:4,border:"1px solid var(--border2)",background:"#fff",color:"var(--text2)",fontWeight:600}}>Editar</button>
        {t.status==="concluido" && <button onClick={()=>onArquivar(t.id)} style={{fontSize:10,padding:"3px 9px",cursor:"pointer",borderRadius:4,border:"1px solid var(--border2)",background:"#fff",color:"var(--text2)",fontWeight:600}}>📦 Arquivar</button>}
        <button onClick={()=>onExcluir(t.id)} style={{fontSize:10,padding:"3px 9px",cursor:"pointer",borderRadius:4,border:"none",background:"none",color:"var(--text3)",marginLeft:"auto"}}>🗑</button>
      </div>
    </div>
  );
}

function KanbanTarefas({tarefas, processos, clientes, equipe, onAbrirProcesso, onEditar, onArquivar, onExcluir, onExecutar, onVerRapido, onMudarStatus}){
  const [colunaAlvo, setColunaAlvo] = useState(null);
  const dragId = React.useRef(null);

  const onDragStart = (e, id) => { dragId.current = id; e.dataTransfer.effectAllowed = "move"; };
  const onDrop = (status) => {
    if(dragId.current!=null) onMudarStatus(dragId.current, status);
    dragId.current = null;
    setColunaAlvo(null);
  };

  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,alignItems:"start"}}>
      {STATUS_TAREFA_VALIDOS.map(statusKey=>{
        const cfg = STATUS_TAREFA_CFG[statusKey];
        const itens = tarefas.filter(t=>t.status===statusKey).sort((a,b)=>{
          if(a.prazo && b.prazo) return a.prazo.localeCompare(b.prazo);
          if(a.prazo) return -1;
          if(b.prazo) return 1;
          return 0;
        });
        const emAlvo = colunaAlvo===statusKey;
        return (
          <div
            key={statusKey}
            onDragOver={e=>{e.preventDefault();setColunaAlvo(statusKey);}}
            onDragLeave={()=>setColunaAlvo(c=>c===statusKey?null:c)}
            onDrop={e=>{e.preventDefault();onDrop(statusKey);}}
            style={{background:emAlvo?"var(--accent-light)":"var(--bg2)",borderRadius:10,padding:"12px",minHeight:120,transition:"background .15s",border:emAlvo?"1px dashed var(--accent)":"1px dashed transparent"}}
          >
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"0 2px"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:cfg.dot}}/>
              <span style={{fontSize:11.5,fontWeight:700,color:"var(--text1)",textTransform:"uppercase",letterSpacing:".4px"}}>{cfg.label}</span>
              <span style={{fontSize:11,color:"var(--text2)",marginLeft:"auto"}}>{itens.length}</span>
            </div>
            {itens.length===0 ? (
              <div style={{fontSize:11.5,color:"var(--text3)",textAlign:"center",padding:"20px 0"}}>Arraste um item para cá</div>
            ) : itens.map(t=>{
              const atrasada = t.prazo && t.status!=="concluido" && diasRest(t.prazo)<0;
              return (
                <CardTarefaKanban key={t.id} t={t} processos={processos} clientes={clientes} equipe={equipe} atrasada={atrasada}
                  onAbrirProcesso={onAbrirProcesso} onEditar={onEditar} onArquivar={onArquivar} onExcluir={onExcluir} onExecutar={onExecutar} onVerRapido={onVerRapido} onDragStart={onDragStart}/>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function CardTarefaDetalhado({t, processos, clientes, equipe, onAbrirProcesso, onEditar, onArquivar, onExcluir, onExecutar, onVerRapido, onMudarStatus}){
  const [menuAberto, setMenuAberto] = useState(false);
  const pCfg = PRIORIDADE_CFG[t.prioridade]||PRIORIDADE_CFG.media;
  const sCfg = STATUS_TAREFA_CFG[t.status]||STATUS_TAREFA_CFG.pendente;
  const respNome = id => (equipe||[]).find(m=>String(m.id)===String(id))?.nome || "—";
  const procNum = id => processos.find(p=>String(p.id)===String(id))?.numero || "—";
  const nomeCliente = (()=>{
    if(t.clienteId){ const c=(clientes||[]).find(x=>String(x.id)===String(t.clienteId)); if(c) return c.nome; }
    if(t.procId){ const proc=processos.find(p=>String(p.id)===String(t.procId)); if(proc?.clienteId){ const c=(clientes||[]).find(x=>x.id===proc.clienteId); if(c) return c.nome; } }
    return null;
  })();
  const iniciais = nomeCliente ? nomeCliente.trim().split(/\s+/).slice(0,2).map(p=>p[0]).join("").toUpperCase() : null;
  const naoCumprido = t.status !== "concluido";
  const dias = t.prazo ? diasRest(t.prazo) : null;
  const atrasado = naoCumprido && dias!==null && dias<0;
  const urgente = naoCumprido && dias!==null && dias>=0 && dias<=3;
  const prazoBg = atrasado ? "var(--red-bg)" : urgente ? "var(--amber-bg)" : "var(--green-bg)";
  const prazoCor = atrasado ? "var(--red)" : urgente ? "var(--amber)" : "var(--green)";

  return (
    <div style={{background:"#fff",borderRadius:10,border:"1px solid var(--border1)",borderLeft:`4px solid ${pCfg.color}`,overflow:"hidden",marginBottom:12}}>
      <div style={{padding:"14px 18px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:700,color:sCfg.color,textTransform:"uppercase",letterSpacing:".5px"}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:sCfg.dot,display:"inline-block"}}/>{sCfg.label}
          </span>
          <Pill bg={pCfg.bg} color={pCfg.color} label={pCfg.label}/>
        </div>
        <div onClick={()=>onVerRapido(t)} style={{display:"flex",alignItems:"center",gap:14,marginBottom:14,cursor:"pointer"}}>
          <div style={{width:52,height:52,borderRadius:10,background:pCfg.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:iniciais?16:20,fontWeight:800,color:pCfg.color}}>
            {iniciais || "⚖"}
          </div>
          <div style={{minWidth:0}}>
            {nomeCliente && <p style={{fontSize:13.5,color:"var(--text2)",fontWeight:500,margin:"0 0 2px"}}>{nomeCliente}</p>}
            <p style={{fontSize:19,fontWeight:800,color:"var(--text1)",margin:0,letterSpacing:"-.2px",lineHeight:1.25}}>{t.titulo}</p>
          </div>
        </div>

        <div style={{display:"flex",border:"1px solid var(--border1)",borderRadius:8,marginBottom:10,overflow:"hidden"}}>
          <div style={{flex:1,padding:"10px 14px",borderRight:"1px solid var(--border1)",minWidth:0}}>
            <p style={{fontSize:10,color:"var(--text3)",margin:"0 0 3px",display:"flex",alignItems:"center",gap:5}}>📄 Processo</p>
            {t.procId ? (
              <p onClick={()=>{const p=processos.find(x=>String(x.id)===String(t.procId));if(p)onAbrirProcesso(p);}} style={{fontSize:12,fontWeight:600,margin:0,cursor:"pointer",textDecoration:"underline",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{procNum(t.procId)}</p>
            ) : <p style={{fontSize:12,fontWeight:600,margin:0,color:"var(--text3)"}}>—</p>}
          </div>
          <div style={{flex:1,padding:"10px 14px",borderRight:"1px solid var(--border1)",minWidth:0}}>
            <p style={{fontSize:10,color:"var(--text3)",margin:"0 0 4px",display:"flex",alignItems:"center",gap:5}}>◇ Fase</p>

function PaginaTarefas({tarefas, setTarefas, processos, clientes, equipe, onAbrirProcesso, onVerPrazoRapido}){
  const [editando,setEditando] = useState(null);
  const [novo,setNovo] = useState(false);
  const [filtroStatus,setFiltroStatus] = useState("todos");
  const [filtroResp,setFiltroResp] = useState("");
  const [busca,setBusca] = useState("");
  const [visao,setVisao] = useState("kanban");
  const [executandoTarefa,setExecutandoTarefa] = useState(null);

  const ativas = (tarefas||[]).filter(t=>!t.arquivada);
  const lista = useMemo(()=>{
    const q = busca.toLowerCase();
    return ativas.filter(t=>{
      if(filtroStatus!=="todos" && t.status!==filtroStatus) return false;
      if(filtroResp && String(t.responsavelId)!==filtroResp) return false;
      if(q && !t.titulo.toLowerCase().includes(q)) return false;
      return true;
    }).sort((a,b)=>{
      if(a.prazo && b.prazo) return a.prazo.localeCompare(b.prazo);
      if(a.prazo) return -1;
      if(b.prazo) return 1;
      return 0;
    });
  },[ativas,filtroStatus,filtroResp,busca]);

  const salvar = form => {
    setTarefas(ts=>form.id?ts.map(t=>t.id===form.id?form:t):[...ts,{...form,id:Date.now(),arquivada:false}]);
    setEditando(null); setNovo(false);
  };
  const mudarStatus = (id, status) => setTarefas(ts=>ts.map(t=>t.id===id?{...t,status}:t));
  const arquivar = id => setTarefas(ts=>ts.map(t=>t.id===id?{...t,arquivada:true}:t));
  const excluir = id => {
    if(!confirm("Excluir este prazo/tarefa? Esta ação não pode ser desfeita.")) return;
    setTarefas(ts=>ts.filter(t=>t.id!==id));
    excluirNoSupabase("tarefas", id);
  };

  const respNome = id => (equipe||[]).find(m=>String(m.id)===String(id))?.nome || "";
  const procNum = id => processos.find(p=>String(p.id)===String(id))?.numero || "";

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:"var(--text1)",margin:"0 0 3px",letterSpacing:"-.02em"}}>Prazos e Tarefas</h1>
          <p style={{fontSize:12.5,color:"var(--text2)",margin:0}}>{ativas.length} item(ns) ativo(s)</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",background:"var(--bg2)",borderRadius:7,padding:3}}>
            {[["kanban","▦ Kanban"],["lista","☰ Lista"]].map(([v,l])=>(
              <button key={v} onClick={()=>setVisao(v)} style={{padding:"6px 13px",fontSize:11.5,fontWeight:600,border:"none",borderRadius:5,cursor:"pointer",background:visao===v?"#fff":"transparent",color:visao===v?"var(--navy2)":"var(--text2)",boxShadow:visao===v?"0 1px 3px rgba(0,0,0,.1)":"none",whiteSpace:"nowrap"}}>{l}</button>
            ))}
          </div>
          <button onClick={()=>setNovo(true)} style={{...btnPri,padding:"9px 18px",fontSize:12.5}}>+ Novo prazo/tarefa</button>
        </div>
      </div>
      <div style={{background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:12}}>
        <div style={{display:"flex",gap:0}}>
          {[["todos","Todos"],...STATUS_TAREFA_VALIDOS.map(k=>[k,STATUS_TAREFA_CFG[k].label])].map(([v,l])=>(
            <button key={v} onClick={()=>setFiltroStatus(v)} style={{background:"none",border:"none",borderBottom:filtroStatus===v?"2px solid var(--navy2)":"2px solid transparent",color:filtroStatus===v?"var(--navy2)":"var(--text2)",padding:"5px 12px 7px",fontSize:11,fontWeight:filtroStatus===v?700:500,cursor:"pointer",textTransform:"uppercase",letterSpacing:".5px",whiteSpace:"nowrap",opacity:visao==="kanban"?.4:1,pointerEvents:visao==="kanban"?"none":"auto"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <select value={filtroResp} onChange={e=>setFiltroResp(e.target.value)} style={{...inp,padding:"6px 8px",fontSize:12,width:150}}>
            <option value="">Todos os responsáveis</option>
            {(equipe||[]).map(m=><option key={m.id} value={m.id}>{m.nome}</option>)}
          </select>
          <input placeholder="Buscar…" value={busca} onChange={e=>setBusca(e.target.value)} style={{fontSize:12,padding:"6px 11px",borderRadius:5,border:"1px solid var(--border2)",width:160}}/>
        </div>
      </div>

      {visao==="kanban" ? (
        <KanbanTarefas
          tarefas={useMemo(()=>{
            const q = busca.toLowerCase();
            return ativas.filter(t=>{
              if(filtroResp && String(t.responsavelId)!==filtroResp) return false;
              if(q && !t.titulo.toLowerCase().includes(q)) return false;
              return true;
            });
          },[ativas,filtroResp,busca])}
          processos={processos} clientes={clientes} equipe={equipe}
          onAbrirProcesso={onAbrirProcesso} onEditar={setEditando} onArquivar={arquivar} onExcluir={excluir} onExecutar={setExecutandoTarefa} onVerRapido={onVerPrazoRapido} onMudarStatus={mudarStatus}
        />
      ) : (
        <div>
          {lista.length===0?(
            <div style={{background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"2.5rem",textAlign:"center",color:"var(--text2)",fontSize:13}}>Nenhum prazo ou tarefa encontrado.</div>
          ):lista.map(t=>(
            <CardTarefaDetalhado
              key={t.id} t={t} processos={processos} clientes={clientes} equipe={equipe}
              onAbrirProcesso={onAbrirProcesso} onEditar={setEditando} onArquivar={arquivar} onExcluir={excluir}
              onExecutar={setExecutandoTarefa} onVerRapido={onVerPrazoRapido} onMudarStatus={mudarStatus}
            />
          ))}
        </div>
      )}
      {(editando||novo)&&<ModalFormTarefa tarefa={editando} processos={processos} clientes={clientes} equipe={equipe||[]} onSave={salvar} onClose={()=>{setEditando(null);setNovo(false);}}/>}
      {executandoTarefa&&<ModalExecutarTarefaIA
        tarefa={executandoTarefa}
        processo={executandoTarefa.procId ? processos.find(p=>String(p.id)===String(executandoTarefa.procId)) : null}
        cliente={(()=>{
          if(executandoTarefa.clienteId) return clientes.find(c=>String(c.id)===String(executandoTarefa.clienteId));
          if(executandoTarefa.procId){ const proc=processos.find(p=>String(p.id)===String(executandoTarefa.procId)); if(proc?.clienteId) return clientes.find(c=>c.id===proc.clienteId); }
          return null;
        })()}
        onClose={()=>setExecutandoTarefa(null)}
        onConcluir={id=>mudarStatus(id,"concluido")}
      />}
    </div>
  );
}

function CalendarioAgenda({itens, onAbrirItem, onNovoNoDia}){
  const [mesRef, setMesRef] = useState(()=>{ const d = new Date(hoje); d.setDate(1); return d; });
  const [diaSelecionado, setDiaSelecionado] = useState(null);

  const mudarMes = delta => setMesRef(d=>{ const n = new Date(d); n.setMonth(n.getMonth()+delta); return n; });
  const irParaHoje = () => { const d = new Date(hoje); d.setDate(1); setMesRef(d); setDiaSelecionado(hoje.toISOString().slice(0,10)); };

  const porDia = useMemo(()=>{
    const map = {};
    itens.forEach(it=>{
      const chave = (it.dataHora||"").slice(0,10);
      if(!chave) return;
      if(!map[chave]) map[chave] = [];
      map[chave].push(it);
    });
    Object.values(map).forEach(arr=>arr.sort((a,b)=>a.dataHora.localeCompare(b.dataHora)));
    return map;
  },[itens]);

  const ano = mesRef.getFullYear(), mes = mesRef.getMonth();
  const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();
  const celulas = [];
  for(let i=0;i<primeiroDiaSemana;i++) celulas.push(null);
  for(let d=1;d<=diasNoMes;d++) celulas.push(d);
  while(celulas.length%7!==0) celulas.push(null);

  const hojeStr = hoje.toISOString().slice(0,10);
  const chaveDia = d => `${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const itensDoDiaSel = diaSelecionado ? (porDia[diaSelecionado]||[]) : [];

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:14,background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"8px 14px"}}>
        <button onClick={()=>mudarMes(-1)} style={{background:"none",border:"1px solid var(--border2)",borderRadius:5,width:30,height:30,cursor:"pointer",fontSize:14,color:"var(--text2)"}}>←</button>
        <span style={{fontSize:13,fontWeight:700,color:"var(--navy)",textTransform:"capitalize",minWidth:160,textAlign:"center"}}>{mesRef.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})}</span>
        <button onClick={()=>mudarMes(1)} style={{background:"none",border:"1px solid var(--border2)",borderRadius:5,width:30,height:30,cursor:"pointer",fontSize:14,color:"var(--text2)"}}>→</button>
        <span style={{width:1,height:20,background:"var(--border1)"}}/>
        <button onClick={irParaHoje} style={{fontSize:11,padding:"5px 12px",cursor:"pointer",borderRadius:5,border:"1px solid var(--border2)",background:"#fff",color:"var(--accent)",fontWeight:600}}>Hoje</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:6}}>
        {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:10.5,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".4px",padding:"4px 0"}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
        {celulas.map((d,i)=>{
          if(d===null) return <div key={i} style={{minHeight:92}}/>;
          const chave = chaveDia(d);
          const itensDia = porDia[chave]||[];
          const ehHoje = chave===hojeStr;
          const selecionado = chave===diaSelecionado;
          return (
            <div
              key={i}
              onClick={()=>setDiaSelecionado(chave)}
              style={{
                minHeight:92, background:selecionado?"var(--accent-light)":"#fff",
                border:`1px solid ${ehHoje?"var(--accent)":"var(--border1)"}`, borderRadius:7,
                padding:"6px 6px", cursor:"pointer", display:"flex", flexDirection:"column", gap:3,
              }}
            >
              <span style={{fontSize:11,fontWeight:ehHoje?800:600,color:ehHoje?"var(--accent)":"var(--text1)"}}>{d}</span>
              <div style={{display:"flex",flexDirection:"column",gap:2,overflow:"hidden"}}>
                {itensDia.slice(0,3).map(it=>{
                  const cfg = TIPO_AGENDA_CFG[it.tipo]||TIPO_AGENDA_CFG.outro;
                  return (
                    <div key={it.id} onClick={e=>{e.stopPropagation();onAbrirItem(it);}} style={{fontSize:9.5,padding:"1px 5px",borderRadius:3,background:cfg.bg,color:cfg.color,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {it.titulo}
                    </div>
                  );
                })}
                {itensDia.length>3 && <span style={{fontSize:9,color:"var(--text3)",paddingLeft:5}}>+{itensDia.length-3} mais</span>}
              </div>
            </div>
          );
        })}
      </div>

      {diaSelecionado && (
        <div style={{marginTop:16,background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{fontSize:12.5,fontWeight:700,color:"var(--navy)",margin:0}}>{new Date(diaSelecionado+"T00:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"})}</p>
            {onNovoNoDia && <button onClick={()=>onNovoNoDia(diaSelecionado)} style={{...btnSec,fontSize:10.5,padding:"5px 10px"}}>+ Compromisso neste dia</button>}
          </div>
          {itensDoDiaSel.length===0?(
            <p style={{fontSize:12,color:"var(--text2)"}}>Nada agendado para este dia.</p>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {itensDoDiaSel.map(it=>{
                const cfg = TIPO_AGENDA_CFG[it.tipo]||TIPO_AGENDA_CFG.outro;
                return (
                  <div key={it.id} onClick={()=>onAbrirItem(it)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",border:"1px solid var(--border1)",borderRadius:6,cursor:"pointer"}}>
                    <span style={{fontSize:11,color:"var(--text2)",width:44,flexShrink:0}}>{new Date(it.dataHora).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</span>
                    <span style={{fontSize:12.5,fontWeight:600,flex:1}}>{it.titulo}</span>
                    <Pill bg={cfg.bg} color={cfg.color} label={it._origemTarefa?"Prazo/Tarefa":cfg.label} sm/>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function PaginaAgenda({agenda, setAgenda, processos, clientes, equipe, tarefas, onAbrirProcesso, onIrParaTarefa, googleConectado, googleSincronizando, googleUltimaSinc, googleErro, onConectarGoogle, onDesconectarGoogle, onSincronizarGoogle, onEnviarAoGoogle, onExcluirNoGoogle}){
  const [editando,setEditando] = useState(null);
  const [novo,setNovo] = useState(false);
  const [novoComData,setNovoComData] = useState(null);
  const [filtroTipo,setFiltroTipo] = useState("todos");
  const [visao,setVisao] = useState("calendario");

  // Pedido: os prazos e tarefas com data também aparecem na Agenda, mesclados
  // com os compromissos — marcados como "Prazo/Tarefa" e levando de volta à página de origem.
  const itensDeTarefas = useMemo(()=>{
    return (tarefas||[])
      .filter(t=>!t.arquivada && t.status!=="concluido" && t.prazo)
      .map(t=>({
        id: `tarefa-${t.id}`,
        titulo: t.titulo,
        tipo: "prazo",
        dataHora: `${t.prazo}T23:59`,
        procId: t.procId || "",
        local: "",
        obs: "",
        _origemTarefa: t,
      }));
  },[tarefas]);

  const listaCombinada = useMemo(()=>{
    return [...(agenda||[]), ...itensDeTarefas];
  },[agenda, itensDeTarefas]);

  const lista = useMemo(()=>{
    return listaCombinada.filter(c=>filtroTipo==="todos"||c.tipo===filtroTipo).sort((a,b)=>new Date(a.dataHora)-new Date(b.dataHora));
  },[listaCombinada,filtroTipo]);

  // Ao salvar/excluir um compromisso, também reflete no Google Agenda (se conectado).
  const salvar = form => {
    const ehNovo = !form.id;
    const salvo = ehNovo ? {...form,id:Date.now()} : form;

function PaginaImportacao({processos, setProcessos, clientes, setClientes}){
  const [texto,setTexto] = useState("");
  const [processando,setProcessando] = useState(false);
  const [erro,setErro] = useState("");
  const [resultado,setResultado] = useState(null);

  const processar = async () => {
    if(!texto.trim()){ setErro("Cole os dados do relatório antes de processar."); return; }
    setErro(""); setProcessando(true); setResultado(null);
    try {
      let res;
      try {
        res = await fetch(IA_PROXY_URL, {
          method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPABASE_KEY},
          body: JSON.stringify({
            model:"claude-sonnet-4-6", max_tokens:4000,
            system: `Você extrai uma lista de processos de um relatório colado (pode ser de PDF, planilha ou painel de tribunal). Retorne SOMENTE um JSON array, sem texto adicional:
[{"numero":"","autor":"","reu":"","vara":"","assunto":"","valorCausa":""}]
Use string vazia quando a informação não existir. Nunca invente dados.`,
            messages:[{role:"user",content:texto}]
          })
        });
      } catch(e) { throw new Error("Sem conexão com o serviço de IA."); }
      if(!res.ok) throw new Error(`Erro HTTP ${res.status}.`);
      const data = await res.json();
      const txt = data.content?.find(b=>b.type==="text")?.text || "";
      const parsed = JSON.parse(txt.replace(/```json|```/g,"").trim());
      if(!Array.isArray(parsed)) throw new Error("Formato inesperado.");
      setResultado(parsed.map((p,i)=>({...p, _id:i, _selecionado:true})));
    } catch(e) {
      setErro(e.message || "Não foi possível interpretar o texto.");
    }
    setProcessando(false);
  };

  const confirmar = () => {
    const escolhidos = resultado.filter(r=>r._selecionado);
    let novosClientes = [...clientes];
    const novosProcessos = escolhidos.map((r,i)=>{
      let clienteId = null;
      if(r.autor){
        const existente = novosClientes.find(c=>c.nome.toLowerCase()===r.autor.toLowerCase());
        if(existente) clienteId = existente.id;
        else {
          clienteId = Date.now()+i*7+Math.floor(Math.random()*1000);
          novosClientes.push({id:clienteId, nome:r.autor, cpf:"", email:"", telefone:"", endereco:"", obs:"Importado via relatório."});
        }
      }
      return {
        id: Date.now()+i*13+Math.floor(Math.random()*1000), clienteId, numero:r.numero||"", tipo:"judicial", classificacao:"",
        autor:r.autor||"", reu:r.reu||"", vara:r.vara||"", responsavel:"", status:"em_andamento", prazo:"",
        debito:null, assunto:r.assunto||"", valorCausa:r.valorCausa||"", andamentos:[], documentos:[], checklist:{},
        obs:"Importado via relatório.",
      };
    });
    setClientes(novosClientes);
    setProcessos(ps=>[...ps, ...novosProcessos]);
    setTexto(""); setResultado(null);
  };

  return (
    <div>
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:22,fontWeight:700,color:"var(--text1)",margin:"0 0 3px",letterSpacing:"-.02em"}}>Importação em lote</h1>
        <p style={{fontSize:12.5,color:"var(--text2)",margin:0}}>Cole um relatório de processos (PDF copiado, planilha, painel) para importar vários de uma vez</p>
      </div>
      {!resultado ? (
        <div style={{background:"#fff",border:"1px solid var(--border1)",borderRadius:8,padding:"1.25rem"}}>
          <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Cole aqui o conteúdo do relatório…" style={{width:"100%",minHeight:200,fontSize:12,padding:"10px",borderRadius:6,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",marginBottom:10}}/>
          {erro&&<p style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{erro}</p>}
          <button onClick={processar} disabled={processando} style={{...btnPri,opacity:processando?.7:1}}>{processando?"Processando…":"✨ Processar com IA"}</button>
        </div>
      ) : (
        <div>
          <p style={{fontSize:12.5,color:"var(--text2)",marginBottom:10}}>{resultado.length} processo(s) identificado(s). Desmarque os que não deseja importar.</p>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {resultado.map(r=>(
              <label key={r._id} style={{display:"flex",gap:10,alignItems:"flex-start",border:"1px solid var(--border1)",borderRadius:6,padding:"8px 10px",background:"#fff",cursor:"pointer"}}>
                <input type="checkbox" checked={r._selecionado} onChange={()=>setResultado(rs=>rs.map(x=>x._id===r._id?{...x,_selecionado:!x._selecionado}:x))} style={{width:15,height:15,marginTop:2}}/>
                <div>
                  <p style={{fontSize:12,fontWeight:600,margin:"0 0 2px"}}>{r.numero||"(sem número)"}</p>
                  <p style={{fontSize:11.5,color:"var(--text2)",margin:0}}>{r.autor} vs. {r.reu}</p>
                </div>
              </label>
            ))}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setResultado(null)} style={btnSec}>Cancelar</button>
            <button onClick={confirmar} style={btnPri}>+ Importar {resultado.filter(r=>r._selecionado).length} processo(s)</button>
          </div>
        </div>
      )}
    </div>
  );
}

// Problema 1: campos de ID/data vazios ("") quebram o salvamento no Supabase
// (colunas numéricas/data não aceitam string vazia). Esta função converte
// qualquer campo vazio relevante para null antes de enviar ao banco.
function sanitizarParaSupabase(obj){
  const limpo = {...obj};
  Object.keys(limpo).forEach(k=>{
    if(limpo[k] === ""){
      if(/Id$/.test(k) || /^(prazo|data|vencimento)/i.test(k)){
        limpo[k] = null;
      }
    }
  });
  return limpo;
}

// Causa raiz do "dado excluído reaparece": o autoSave só fazia upsert (inserir/atualizar),
// nunca DELETE. Então excluir algo na tela só escondia localmente — no Supabase a linha
// continuava existindo e voltava no próximo carregamento. Esta função excluiu de verdade.
async function excluirNoSupabase(tabela, idOuIds){
  if(!sb) return;
  try {
    const ids = Array.isArray(idOuIds) ? idOuIds : [idOuIds];
    if(ids.length === 0) return;
    const { error } = await sb.from(tabela).delete().in("id", ids);
    if(error) console.error(`Erro ao excluir de ${tabela}:`, error);
  } catch(e) {
    console.error(`Erro ao excluir de ${tabela}:`, e);
  }
}

function AppPrincipal({user}){
