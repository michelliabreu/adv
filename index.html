<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const hoje = new Date(); hoje.setHours(0,0,0,0);
const fmtBRL = v => (v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtData = s => { if(!s) return "—"; return new Date(s+"T00:00:00").toLocaleDateString("pt-BR"); };
const fmtDataHora = s => { if(!s) return "—"; const d=new Date(s); return d.toLocaleDateString("pt-BR")+" às "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); };
const diasRest = s => Math.ceil((new Date(s+"T00:00:00") - hoje) / 864e5);
const isUrgProc = p => p.status !== "encerrado" && p.prazo && diasRest(p.prazo) <= 7;
const uid = () => Math.random().toString(36).slice(2,9);
const statusParcela = p => {
  if(p.pago) return "pago";
  const d = diasRest(p.vencimento);
  if(d < 0) return "vencido";
  if(d <= 7) return "aVencer";
  return "pendente";
};
const fmtCPF = v => {
  const n=(v||"").replace(/\D/g,"").slice(0,11);
  return n.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
};
const fmtTelefone = v => {
  const n=(v||"").replace(/\D/g,"").slice(0,11);
  if(n.length<=10) return n.replace(/(\d{2})(\d)/,"($1) $2").replace(/(\d{4})(\d)/,"$1-$2");
  return n.replace(/(\d{2})(\d)/,"($1) $2").replace(/(\d{5})(\d)/,"$1-$2");
};

const PALAVRAS_DECISAO = ["sentença","acórdão","despacho","decisão","determinou","determino","intimação","intimo","condeno","defiro","indefiro","homologo","adjudico","extingo","arquive","cite-se","citem-se","penhora","penhorado"];

const TABELA_PRAZOS = [
  {palavras:["contestação","contestar"],prazo:15,parte:"Réu",ato:"Apresentar contestação",base:"Art. 335 CPC"},
  {palavras:["réplica","impugnação à contestação"],prazo:15,parte:"Autor",ato:"Apresentar réplica",base:"Art. 350 CPC"},
  {palavras:["sentença"],prazo:15,parte:"Ambas",ato:"Interpor apelação",base:"Art. 1.003 §5º CPC"},
  {palavras:["acórdão"],prazo:15,parte:"Ambas",ato:"Interpor recurso cabível",base:"Art. 1.003 §5º CPC"},
  {palavras:["decisão interlocutória"],prazo:15,parte:"Prejudicado",ato:"Interpor agravo de instrumento",base:"Art. 1.015 CPC"},
  {palavras:["embargos de declaração"],prazo:5,parte:"Embargante",ato:"Opor embargos de declaração",base:"Art. 1.023 CPC"},
  {palavras:["penhora","penhorado","constrição"],prazo:15,parte:"Executado",ato:"Impugnar penhora ou apresentar embargos",base:"Art. 915 CPC"},
  {palavras:["bacen jud","sisbajud","bloqueio"],prazo:5,parte:"Executado",ato:"Impugnar bloqueio de valores",base:"Art. 854 §3º CPC"},
  {palavras:["alimentos","fixados alimentos"],prazo:15,parte:"Devedor",ato:"Recorrer ou cumprir obrigação alimentar",base:"Art. 1.003 §5º CPC / Lei 5.478/68"},
  {palavras:["intimação","intimado"],prazo:5,parte:"Intimado",ato:"Manifestar-se ou cumprir",base:"Art. 218 CPC"},
  {palavras:["despacho"],prazo:5,parte:"Intimado",ato:"Cumprir determinação",base:"Art. 218 CPC"},
  {palavras:["citação"],prazo:15,parte:"Réu/Executado",ato:"Apresentar defesa ou pagar",base:"Art. 335 / Art. 829 CPC"},
  {palavras:["manifestação"],prazo:5,parte:"Intimado",ato:"Manifestar-se nos autos",base:"Art. 218 CPC"},
  {palavras:["recurso"],prazo:15,parte:"Recorrente",ato:"Interpor o recurso cabível",base:"Art. 1.003 §5º CPC"},
  {palavras:["inventário","habilitação"],prazo:15,parte:"Herdeiros",ato:"Manifestar-se no inventário",base:"Art. 627 CPC"},
  {palavras:["guarda","regulamentação"],prazo:15,parte:"Requerido",ato:"Contestar ou apresentar proposta",base:"Art. 335 CPC"},
];
function detectarPrazo(andamento){
  if(!andamento) return null;
  const txt=(andamento.desc||"").toLowerCase();
  for(const r of TABELA_PRAZOS){ if(r.palavras.some(p=>txt.includes(p))) return r; }
  return null;
}
function calcularVencimento(dataInicio,dias){
  if(!dataInicio||!dias) return null;
  const d=new Date(dataInicio+"T00:00:00");
  let c=0;
  while(c<dias){ d.setDate(d.getDate()+1); if(d.getDay()!==0&&d.getDay()!==6) c++; }
  return d.toISOString().slice(0,10);
}

// Índices de correção monetária aproximados (simplificado para fins de estimativa)
// Taxa SELIC acumulada mensal aproximada + correção — uso simplificado mensal composto
function calcularCorrecao(valorBase, dataBase, taxaMensal){
  if(!valorBase||!dataBase) return null;
  const meses = Math.max(0, Math.floor((hoje - new Date(dataBase+"T00:00:00")) / (864e5*30)));
  const fator = Math.pow(1 + (taxaMensal/100), meses);
  return parseFloat((valorBase * fator).toFixed(2));
}

const SC = {
  em_andamento:{label:"Em Andamento",dot:"#2563A8",bg:"#E8F0FA",color:"#16345C"},
  pendencia_documentos:{label:"Pendência de Documentos",dot:"#D97706",bg:"#FEF3DC",color:"#92400E"},
  aguardando_cliente:{label:"Aguardando Cliente",dot:"#8B5CF6",bg:"#F2EDFE",color:"#5B21B6"},
  encerrado:{label:"Encerrado",dot:"#6B7280",bg:"#F1F2F4",color:"#374151"},
};
const STATUS_VALIDOS = ["em_andamento","pendencia_documentos","aguardando_cliente","encerrado"];
// Normaliza qualquer status legado (de versões anteriores do sistema) para os status atuais válidos
function normalizarStatus(status){
  return STATUS_VALIDOS.includes(status) ? status : "em_andamento";
}

// ── Helpers de múltiplas partes (litisconsórcio) ───────────
// Um processo pode ter `partes: [{id, nome, polo:"autor"|"reu", clienteId}]`.
// Quando presente, tem prioridade sobre os campos legados `autor`/`reu` (texto único).
function temListaPartes(p){
  return Array.isArray(p.partes) && p.partes.length > 0;
}
function partesPorPolo(p, polo){
  if(temListaPartes(p)) return p.partes.filter(x=>x.polo===polo);
  const nomeTexto = polo==="autor" ? p.autor : p.reu;
  return nomeTexto ? [{id:`legado-${polo}`, nome:nomeTexto, polo, clienteId:null}] : [];
}
function nomesPorPolo(p, polo){
  return partesPorPolo(p, polo).map(x=>x.nome).filter(Boolean);
}
function autorTexto(p){
  return temListaPartes(p) ? nomesPorPolo(p,"autor").join(" e ") : (p.autor||"");
}
function reuTexto(p){
  return temListaPartes(p) ? nomesPorPolo(p,"reu").join(" e ") : (p.reu||"");
}
// Identifica qual nome de cliente deve aparecer em destaque e qual é a parte adversa,
// considerando que o cliente pode estar tanto no polo ativo quanto passivo.
function clientePrincipalEAdversa(p, clientes){
  if(temListaPartes(p)){
    const parteComCliente = p.partes.find(x=>x.clienteId);
    if(parteComCliente){
      const cli = clientes.find(c=>c.id===parteComCliente.clienteId);
      // Polo do cliente x polo oposto. Litisconsortes do mesmo polo viram "e outros".
      const poloCliente = parteComCliente.polo;
      const poloAdverso = poloCliente==="autor" ? "reu" : "autor";
      const mesmosPolo = p.partes.filter(x=>x.polo===poloCliente && x.nome).length;
      const adversos = p.partes.filter(x=>x.polo===poloAdverso).map(x=>x.nome).filter(Boolean);
      const nomeCli = cli ? cli.nome : parteComCliente.nome;
      const nomeClienteExib = mesmosPolo>1 ? `${nomeCli} e outros` : nomeCli;
      const adversaExib = adversos.length>1 ? `${adversos[0]} e outros` : (adversos[0]||"—");
      return { nomeCliente: nomeClienteExib, adversa: adversaExib, clienteObj: cli||null, nomeClienteSimples: nomeCli };
    }
    // sem cliente vinculado: usa autor x réu como referência
    const autores = nomesPorPolo(p,"autor"), reus = nomesPorPolo(p,"reu");
    const autorExib = autores.length>1 ? `${autores[0]} e outros` : (autores[0]||"—");
    const reuExib = reus.length>1 ? `${reus[0]} e outros` : (reus[0]||"—");
    return { nomeCliente: autorExib, adversa: reuExib, clienteObj: null, nomeClienteSimples: autores[0]||"" };
  }
  // formato legado (sem lista de partes)
  const cli = p.clienteId ? clientes.find(c=>c.id===p.clienteId) : null;
  const nomeCli = cli ? cli.nome : (p.autor||"—");
  const adversa = cli ? (cli.nome===p.autor ? (p.reu||"—") : (p.autor||"—")) : (p.reu||"—");
  return { nomeCliente: nomeCli, adversa, clienteObj: cli, nomeClienteSimples: nomeCli };
}

const CC = {
  indenizatoria:{label:"Indenizatória",bg:"#FCEAEA",color:"#991B1B",border:"#FCA5A5"},
  divorcio:{label:"Divórcio",bg:"#F2EDFE",color:"#6B21A8",border:"#D8B4FE"},

// ── Modal: Colar movimentações (substitui busca automática DataJud, bloqueada por CORS) ──
function ModalColarMovimentacoes({proc, onConfirm, onClose}){
  const [texto, setTexto] = useState("");
  const [interpretando, setInterpretando] = useState(false);
  const [erro, setErro] = useState("");
  const [resultado, setResultado] = useState(null);
  const [selecionados, setSelecionados] = useState({});

  const abrirConsultaPublica = () => {
    window.open(`https://www.tjrj.jus.br/consultaProcessual`, "_blank");
  };

  const interpretar = async () => {
    if(!texto.trim()){ setErro("Cole a lista de movimentações antes de interpretar."); return; }
    setErro(""); setInterpretando(true); setResultado(null);
    try {
      let res;
      try {
        res = await fetch(IA_PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_KEY },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 3000,
            system: `Você extrai uma lista de andamentos/movimentações processuais de um texto colado, copiado da consulta pública de um tribunal (formatação pode estar irregular, com quebras de linha, tabelas mal formatadas, datas em formatos variados).

Retorne SOMENTE um JSON válido (array), sem texto adicional, sem markdown. Cada item representa UM andamento distinto:
[{"data":"YYYY-MM-DD","desc":"descrição do andamento, mantendo o texto original ou levemente limpo, sem inventar conteúdo"}]

Ordene do mais antigo para o mais recente. Se uma data não puder ser identificada com confiança, use string vazia no campo data, mas ainda inclua o item. Nunca invente andamentos que não estejam no texto.`,
            messages: [{role:"user", content: texto}]
          })
        });
      } catch(networkErr) {
        throw new Error("Não foi possível conectar ao serviço de IA — verifique sua conexão com a internet.");
      }
      if(!res.ok){
        let detalhe = "";
        try { const errBody = await res.json(); detalhe = errBody?.error?.message || ""; } catch(_){}
        throw new Error(`Erro HTTP ${res.status} ao chamar a IA.${detalhe?` Detalhe: ${detalhe}`:""}`);
      }
      const data = await res.json();
      const txt = data.content?.find(b=>b.type==="text")?.text || "";
      if(!txt) throw new Error("A IA retornou uma resposta vazia.");
      let parsed;
      try {
        parsed = JSON.parse(txt.replace(/```json|```/g,"").trim());
      } catch(parseErr) {
        throw new Error(`A resposta da IA não veio em formato JSON válido. Início: "${txt.slice(0,150)}"`);
      }
      if(!Array.isArray(parsed)) throw new Error("Formato inesperado — a IA não retornou uma lista de andamentos.");

      const existentes = new Set((proc.andamentos||[]).map(a=>(a.data||"")+"|"+(a.desc||"").toLowerCase().trim().slice(0,40)));
      const comFlag = parsed.map((item,i)=>({
        ...item,
        _id: i,
        _duplicado: existentes.has((item.data||"")+"|"+(item.desc||"").toLowerCase().trim().slice(0,40)),
      }));
      setResultado(comFlag);
      const sel = {};
      comFlag.forEach(item=>{ if(!item._duplicado) sel[item._id] = true; });
      setSelecionados(sel);
    } catch(e) {
      setErro(e.message || "Não foi possível interpretar o texto colado. Verifique se copiou a lista de movimentações corretamente.");
    }
    setInterpretando(false);
  };

  const confirmar = () => {
    const escolhidos = resultado.filter(item=>selecionados[item._id]).map(item=>({
      data: item.data || hoje.toISOString().slice(0,10),
      desc: item.desc,
      fonte: "ia",
    }));
    onConfirm(escolhidos);
  };

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(15,38,69,.5)",zIndex:550,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{background:"#fff",width:560,maxWidth:"100%",maxHeight:"90vh",overflow:"auto",borderRadius:10,padding:"1.5rem",boxShadow:"0 20px 50px rgba(0,0,0,.25)"}}>
        <p style={{fontSize:10,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".7px",margin:"0 0 4px",fontWeight:600}}>Colar movimentações do processo</p>
        <p style={{fontSize:13,fontWeight:600,fontFamily:"monospace",margin:"0 0 14px"}}>{proc.numero}</p>
        {!resultado && (
          <>
            <div style={{background:"var(--accent-light)",border:"1px solid #C5DCF2",borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:11.5,color:"var(--navy2)",lineHeight:1.5}}>
              ℹ️ A consulta automática ao DataJud é bloqueada pelo navegador (CORS). Abra a consulta pública do tribunal, copie a lista de movimentações do processo e cole abaixo — a IA organiza automaticamente.
            </div>
            <button onClick={abrirConsultaPublica} style={{...btnSec,width:"100%",padding:"9px",marginBottom:14}}>🔗 Abrir consulta pública do TJRJ</button>
            <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Cole aqui a lista de movimentações copiada do site do tribunal…" style={{width:"100%",minHeight:160,fontSize:12,padding:"10px",borderRadius:6,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",marginBottom:10}}/>
            {erro && <p style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{erro}</p>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={btnSec}>Cancelar</button>
              <button onClick={interpretar} disabled={interpretando} style={{...btnPri,opacity:interpretando?.7:1}}>{interpretando?"Interpretando…":"✨ Interpretar com IA"}</button>
            </div>
          </>
        )}
        {resultado && (
          <>
            <p style={{fontSize:11.5,color:"var(--text2)",marginBottom:10}}>
              {resultado.length} andamento(s) identificado(s) — {resultado.filter(r=>r._duplicado).length} já existem no processo (desmarcados automaticamente).
            </p>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14,maxHeight:320,overflow:"auto"}}>
              {resultado.map(item=>(
                <label key={item._id} style={{display:"flex",gap:10,alignItems:"flex-start",border:"1px solid var(--border1)",borderRadius:6,padding:"8px 10px",cursor:"pointer",opacity:item._duplicado?.55:1}}>
                  <input type="checkbox" checked={!!selecionados[item._id]} onChange={e=>setSelecionados(s=>({...s,[item._id]:e.target.checked}))} style={{width:15,height:15,marginTop:2,flexShrink:0}}/>
                  <div>
                    <p style={{fontSize:11,color:"var(--text2)",margin:"0 0 2px"}}>{item.data?fmtData(item.data):"data não identificada"}{item._duplicado&&<span style={{marginLeft:6,color:"var(--amber)",fontWeight:600}}>· já existe</span>}</p>
                    <p style={{fontSize:12.5,margin:0,lineHeight:1.4}}>{item.desc}</p>
                  </div>
                </label>
              ))}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setResultado(null)} style={btnSec}>Colar outro texto</button>
              <button onClick={confirmar} style={btnPri}>+ Adicionar {Object.values(selecionados).filter(Boolean).length} andamento(s)</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

  const [modo,setModo] = useState("manual");

const NW=160,NH=52,HGAP=80,VGAP=18;
const defaultMap=()=>({nodes:[{id:"root",label:"Evento / Decisão Principal",type:"decisao",children:[]}]});
function buildLayout(nodes){
  const byId={}; nodes.forEach(n=>byId[n.id]={...n,_ch:[]});
  const childSet=new Set();
  nodes.forEach(n=>(n.children||[]).forEach(c=>{if(byId[c]){byId[n.id]._ch.push(byId[c]);childSet.add(c);}}));
  const roots=nodes.filter(n=>!childSet.has(n.id)).map(n=>byId[n.id]);
  const pos={};
  function measure(n){if(!n._ch.length){n._h=NH+VGAP;return;}n._ch.forEach(measure);n._h=n._ch.reduce((s,c)=>s+c._h,0);}
  function place(n,x,y){pos[n.id]={x,y:y+n._h/2-NH/2};let cy=y;n._ch.forEach(c=>{place(c,x+NW+HGAP,cy);cy+=c._h;});}
  let gy=0;roots.forEach(r=>{measure(r);place(r,40,gy);gy+=r._h+VGAP*2;});
  return pos;
}

  const pos=useMemo(()=>buildLayout(nodes.map(n=>({...n}))),[nodes]);
  const maxX=Math.max(...Object.values(pos).map(p=>p.x))+NW+60;
  const maxY=Math.max(...Object.values(pos).map(p=>p.y))+NH+80;
  const addChild=()=>{if(!addForm.label.trim())return;const nn={id:uid(),label:addForm.label.trim(),type:addForm.type,children:[]};sync([...nodes.map(n=>n.id===addingTo?{...n,children:[...(n.children||[]),nn.id]}:n),nn]);setAddingTo(null);setAddForm({label:"",type:"acao"});};
  const saveEdit=()=>{sync(nodes.map(n=>n.id===editingId?{...n,...editForm}:n));setEditingId(null);};

function ChecklistDocumentacao({processo, cliente, onUpdate, onSaveDriveLink}){

  const [novoItem, setNovoItem] = useState("");

  const [editandoLink, setEditandoLink] = useState(false);

  const total = itens.length, done = itens.filter(i=>i.ok).length;
  const pct = total ? Math.round((done/total)*100) : 0;

  const toggle = id => {
    const novos = itens.map(i=>i.id===id?{...i,ok:!i.ok}:i);
    onUpdate({...processo, docChecklist:novos});
  };
  const remover = id => {
    const novos = itens.filter(i=>i.id!==id);
    onUpdate({...processo, docChecklist:novos});
  };
  const adicionar = () => {
    if(!novoItem.trim()) return;
    const novos = [...itens, {id:uid(), nome:novoItem.trim(), ok:false}];
    onUpdate({...processo, docChecklist:novos});
    setNovoItem("");

  return (

      <div style={{background:"var(--bg2)", borderRadius:6, padding:"12px 14px", marginBottom:18, border:"1px solid var(--border1)"}}>

          </div>

        <span style={{fontSize:11,color:"var(--text2)",whiteSpace:"nowrap"}}>{done}/{total} documentos</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {itens.map(item=>(

function ChecklistPanel({processo,onUpdate}){
  const items=CHECKLISTS[processo.classificacao];
  const checklist=processo.checklist||{};
  const [obsLocal,setObsLocal]=useState(processo.obs||"");
  React.useEffect(()=>{ setObsLocal(processo.obs||""); },[processo.id]);
  const salvarObs=()=>{ if(obsLocal!==(processo.obs||"")) onUpdate({...processo,obs:obsLocal}); };

  const blocoObs = (
    <div style={{marginBottom:18}}>
      <p style={{fontSize:10.5,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px",color:"var(--text2)",margin:"0 0 6px"}}>Observações</p>

    </div>

  const cfg=CC[processo.classificacao];
  if(!items || !cfg){
    return <div>{blocoObs}<p style={{fontSize:11.5,color:"var(--text3)",margin:0}}>Não há checklist pré-definido para esta classificação. Use o campo de observações acima.</p></div>;
  }
  const total=items.length,done=items.filter(i=>checklist[i.id]?.checked).length,pct=Math.round((done/total)*100);
  const toggle=id=>{const u={...checklist,[id]:{...checklist[id],checked:!checklist[id]?.checked}};onUpdate({...processo,checklist:u});};
  const setObs=(id,obs)=>{const u={...checklist,[id]:{...checklist[id],obs}};onUpdate({...processo,checklist:u});};
  return(
    <div>

        <div style={{flex:1,height:6,background:"var(--bg2)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"var(--green)":"var(--accent)",borderRadius:3,transition:"width .3s"}}/></div>
        <span style={{fontSize:11,color:"var(--text2)",whiteSpace:"nowrap"}}>{done}/{total} concluídos</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {items.map((item,i)=>{const checked=!!checklist[item.id]?.checked,obs=checklist[item.id]?.obs||"";return(
          <div key={item.id} style={{border:`1px solid ${checked?"#A8DDB8":"var(--border1)"}`,borderRadius:6,padding:"10px 12px",background:checked?"var(--green-bg)":"#fff",transition:"all .2s"}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <div onClick={()=>toggle(item.id)} style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${checked?"var(--green)":"var(--border2)"}`,background:checked?"var(--green)":"transparent",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:1}}>{checked&&<span style={{color:"#fff",fontSize:12,lineHeight:1}}>✓</span>}</div>
              <div style={{flex:1}}>
                <p style={{fontSize:12,fontWeight:600,margin:"0 0 2px",color:checked?"var(--text2)":"var(--text1)",textDecoration:checked?"line-through":"none"}}><span style={{color:"var(--text2)",marginRight:6,fontSize:10}}>P{i+1}</span>{item.pergunta}</p>
                <p style={{fontSize:11,color:"var(--text2)",margin:"0 0 8px",lineHeight:1.4}}>{item.detalhe}</p>
                <input value={obs} onChange={e=>setObs(item.id,e.target.value)} placeholder="Observação / resposta…" style={{width:"100%",fontSize:11,padding:"6px 9px",borderRadius:4,border:"1px solid var(--border1)",background:"var(--bg2)",color:"var(--text1)",boxSizing:"border-box"}}/>
              </div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

            <button onClick={()=>setEditandoAudiencia(true)} style={{...btnSec,fontSize:11,padding:"6px 12px",color:"var(--text2)",display:"inline-flex",alignItems:"center",gap:5}}><Icon name="calendar" size={12}/>+ Agendar audiência</button>

        <div style={{marginTop:10,padding:"10px 12px",background:"var(--bg2)",borderRadius:6,border:"1px solid var(--border1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,fontWeight:600,color:"var(--text1)",display:"inline-flex",alignItems:"center",gap:5}}><Icon name="link" size={12} color="var(--text2)"/>Processo relacionado</span>
            {!editandoVinculo&&<button onClick={()=>setEditandoVinculo(true)} style={{...btnSec,fontSize:10,padding:"3px 10px"}}>{p.vinculo?"✎ Editar":"+ Vincular"}</button>}
          </div>
          {editandoVinculo ? (
            <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
              <select value={vinculoTipo} onChange={e=>setVinculoTipo(e.target.value)} style={{...inp,padding:"6px 8px",fontSize:12}}>
                {["Apensado a","Incidente de","Dependência de","Conexo a"].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <select value={vinculoProcId} onChange={e=>setVinculoProcId(e.target.value?parseInt(e.target.value):"")} style={{...inp,padding:"6px 8px",fontSize:12}}>

                {processos.filter(x=>x.id!==p.id).map(x=><option key={x.id} value={x.id}>{x.numero} — {x.autor.slice(0,30)}</option>)}

                <button onClick={()=>setEditandoVinculo(false)} style={{...btnSec,fontSize:10.5,padding:"4px 10px"}}>Cancelar</button>

              </div>
            </div>
          ) : p.vinculo ? (
            <div onClick={()=>{ const proc = processos.find(x=>x.id===p.vinculo.procId); if(proc) onAbrirOutroProcesso(proc); }} style={{marginTop:6,fontSize:12,color:"var(--accent)",cursor:"pointer"}}>
              {p.vinculo.tipo} <strong>{processos.find(x=>x.id===p.vinculo.procId)?.numero || "processo removido"}</strong>
              <button onClick={e=>{e.stopPropagation(); onRemoverVinculo(p.id);}} style={{marginLeft:8,background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13}}>×</button>

          ) : (
            <p style={{fontSize:11,color:"var(--text3)",margin:"4px 0 0"}}>Nenhum vínculo cadastrado.</p>

        </div>

        <div style={{borderTop:"1px solid var(--border1)",paddingTop:14,marginTop:16}}>
          <div style={{display:"flex",gap:0,marginBottom:14,borderBottom:"1px solid var(--border1)"}}>
            {["andamentos","tarefas","documentacao","checklist"].map(t=><button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",borderBottom:tab===t?"2px solid var(--navy2)":"2px solid transparent",color:tab===t?"var(--navy2)":"var(--text2)",padding:"6px 18px 8px",fontSize:12,fontWeight:tab===t?600:500,cursor:"pointer",textTransform:"uppercase",letterSpacing:".6px",marginBottom:-1,whiteSpace:"nowrap"}}>{t==="documentacao"?"Documentação":t==="checklist"?"Obs / Checklist":t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
          </div>
          {tab==="andamentos"&&<div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>

            <label style={{display:"flex",alignItems:"center",gap:7,fontSize:11.5,color:"var(--text2)",cursor:"pointer",marginBottom:10}}>
              <input type="checkbox" checked={novoAndDecisao} onChange={e=>setNovoAndDecisao(e.target.checked)} style={{width:14,height:14}}/>
              Marcar como decisão/despacho importante
            </label>
            <button onClick={()=>{
              if(!novoAndDesc.trim()||!novoAndData) return;
              onAddAndamento(p.id, {data:novoAndData, desc:novoAndDesc.trim(), fonte:"manual", decisao:novoAndDecisao});
              setNovoAndDesc(""); setNovoAndDecisao(false);
            }} style={{...btnSec, fontSize:11.5, marginBottom:16}}>+ Adicionar andamento</button>

            {andOrd.length===0?<div style={{fontSize:13,color:"var(--text2)"}}>Sem andamentos.</div>:andOrd.map((a,i)=>(
              <div key={i} style={{display:"flex",gap:14,fontSize:13,marginBottom:8,alignItems:"flex-start"}}>
                <span style={{color:"var(--text2)",fontSize:11,whiteSpace:"nowrap",minWidth:80,marginTop:2}}>{fmtData(a.data)}</span>
                <span style={{flex:1}}>{a.desc}
                  {a.decisao===true&&<span style={{marginLeft:6,background:"var(--amber-bg)",color:"var(--amber)",borderRadius:3,padding:"0 5px",fontSize:10,fontWeight:600}}>decisão</span>}
                  {a.fonte==="cnj"&&<span style={{marginLeft:4,background:"var(--accent-light)",color:"var(--navy2)",borderRadius:3,padding:"0 5px",fontSize:10,fontWeight:600}}>CNJ</span>}
                </span>
              </div>
            ))}
          </div>}
          {tab==="tarefas"&&<div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={novaTarefaTitulo} onChange={e=>setNovaTarefaTitulo(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onAddTarefaProcesso(p.id,novaTarefaTitulo);setNovaTarefaTitulo("");}}} placeholder="Ex: Elaborar substabelecimento…" style={{...inp,flex:1}}/>
              <button onClick={()=>{onAddTarefaProcesso(p.id,novaTarefaTitulo);setNovaTarefaTitulo("");}} style={{...btnPri,fontSize:11.5,whiteSpace:"nowrap"}}>+ Criar tarefa</button>
            </div>
            <p style={{fontSize:10.5,color:"var(--text2)",margin:"0 0 14px"}}>A tarefa é criada como <strong>Pendente</strong> no quadro de Tarefas, vinculada a este processo.</p>

            {(tarefasDoProcesso||[]).filter(t=>!t.arquivada).length===0
              ? <div style={{fontSize:13,color:"var(--text2)"}}>Nenhuma tarefa ativa para este processo.</div>
              : (tarefasDoProcesso||[]).filter(t=>!t.arquivada).map(t=>{
                  const cfg = STATUS_TAREFA_CFG[t.status];
                  return (
                    <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid var(--border1)",borderRadius:6,padding:"9px 12px",marginBottom:8}}>
                      <div>
                        {cliente && <p style={{fontSize:13,fontWeight:800,color:"var(--navy)",margin:"0 0 3px",letterSpacing:"-.1px"}}>{cliente.nome}</p>}
                        <p style={{fontSize:12.5,fontWeight:600,margin:"0 0 4px"}}>{t.titulo}</p>
                        <Pill bg={cfg.bg} color={cfg.color} label={cfg.label} sm/>
                      </div>
                      {t.status!=="concluido"
                        ? <button onClick={()=>onConcluirTarefaProc(t.id)} style={{...btnSec,fontSize:10.5,padding:"5px 10px",whiteSpace:"nowrap"}}>✓ Concluir</button>
                        : <button onClick={()=>onArquivarTarefaProc(t.id)} style={{...btnSec,fontSize:10.5,padding:"5px 10px",whiteSpace:"nowrap",color:"var(--text2)",display:"inline-flex",alignItems:"center",gap:5}}><Icon name="archive" size={11}/>Arquivar</button>
                      }
                    </div>
                  );
                })
            }

            {(tarefasDoProcesso||[]).filter(t=>t.arquivada).length>0 && (
              <div style={{marginTop:16}}>
                <p style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--text2)",margin:"0 0 8px"}}>Concluídas e arquivadas</p>
                {(tarefasDoProcesso||[]).filter(t=>t.arquivada).map(t=>(
                  <div key={t.id} style={{fontSize:12,color:"var(--text2)",padding:"6px 0",borderBottom:"1px solid var(--border1)",textDecoration:"line-through"}}>{t.titulo}</div>
                ))}
              </div>
            )}
          </div>}
          {tab==="documentacao"&&<ChecklistDocumentacao processo={p} cliente={cliente} onUpdate={onChecklistUpdate} onSaveDriveLink={onSaveDriveLink}/>}
          {tab==="checklist"&&<ChecklistPanel processo={p} onUpdate={onChecklistUpdate}/>}
        </div>
        <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid var(--border1)"}}>
          <label style={{display:"flex",alignItems:"center",gap:8,fontSize:11.5,color:"var(--text2)",cursor:"pointer"}}>
            <input type="checkbox" checked={!!p.arquivado} onChange={e=>onToggleArquivado(p.id, e.target.checked)} style={{width:15,height:15}}/>
            Arquivar este processo
          </label>
          {p.arquivado&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {[["baixado_definitivo","Baixado Definitivo"],["ag_prescricao","Ag. Prescrição"]].map(([v,l])=>(
                <button key={v} onClick={()=>onToggleArquivado(p.id, true, v)} style={{
                  fontSize:10.5,padding:"5px 12px",cursor:"pointer",borderRadius:5,fontWeight:600,
                  border:`1px solid ${p.situacaoArquivo===v?"var(--navy2)":"var(--border2)"}`,
                  background:p.situacaoArquivo===v?"var(--navy2)":"#fff",
                  color:p.situacaoArquivo===v?"#fff":"var(--text2)",
                }}>{l}</button>
              ))}
            </div>
          )}
        </div>

        <div style={{marginTop:20,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
          {onExcluir&&<button onClick={()=>{onExcluir(p.id);onClose();}} style={{...btnSec,color:"var(--red)",borderColor:"#F3B8B8",marginRight:"auto"}}>🗑 Excluir processo</button>}
          <button onClick={()=>onSavePrazo(p)} style={{...btnSec,display:"flex",alignItems:"center",gap:6}}>⏱ Analisar prazo</button>
          <button onClick={()=>onEdit(p)} style={btnSec}>Editar</button>
          <button onClick={onClose} style={btnPri}>Fechar</button>
        </div>
      </div>
      {editandoDebito&&<ModalDebito proc={p} cliente={cliente} onSave={(info,parcelasGeradas)=>{onSaveDebito(p.id,info,parcelasGeradas);setEditandoDebito(false);}} onClose={()=>setEditandoDebito(false)}/>}
      {registrandoExito&&<ModalExito proc={p} cliente={cliente} onSave={registro=>{onRegistrarExito(p.id,registro);setRegistrandoExito(false);}} onClose={()=>setRegistrandoExito(false)}/>}
      {enviandoCobranca&&<ModalEnviarCobranca proc={p} cliente={cliente} exito={enviandoCobranca} onClose={()=>setEnviandoCobranca(null)}/>}
    </div>
  );
}

// ── Modal Form Processo (sem campo e-mail — fica no Cliente) ──
function ParteLinha({parte, updParte, delParte, clientes}){
  return (
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
      <input value={parte.nome} onChange={e=>updParte(parte.id,"nome",e.target.value)} placeholder="Nome completo" style={{...inp,flex:1,fontSize:12,padding:"6px 9px"}}/>
      <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:parte.clienteId?"var(--accent)":"var(--text2)",fontWeight:parte.clienteId?600:400,whiteSpace:"nowrap",cursor:"pointer"}}>
        <input type="checkbox" checked={!!parte.clienteId} onChange={e=>updParte(parte.id,"clienteId", e.target.checked ? true : null)} style={{width:14,height:14,cursor:"pointer"}}/>
        É o cliente
      </label>
      <button type="button" onClick={()=>delParte(parte.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:15,padding:"0 4px",lineHeight:1}}>×</button>
    </div>
  );
}
function PartesEditor({partes, setPartes, clientes}){
  const addParte = (polo) => setPartes(ps=>[...ps, {id:uid(), nome:"", polo, clienteId:null}]);
  const updParte = (id, campo, valor) => setPartes(ps=>ps.map(x=>x.id===id?{...x,[campo]:valor}:x));
  const delParte = (id) => setPartes(ps=>ps.filter(x=>x.id!==id));
  const autores = partes.filter(x=>x.polo==="autor");

// Resolve o(s) cliente(s) marcado(s) com o checkbox "É o cliente": sincroniza com um
// cliente já cadastrado com o mesmo nome, ou cria um novo cliente automaticamente.
function resolverClientesDasPartes(partes, clientesAtuais, setClientes){
  if(!partes || !partes.length) return partes;
  const clientesNovos = [];
  const partesResolvidas = partes.map(parte => {
    if(parte.clienteId === true){
      const nomeNorm = (parte.nome||"").trim().toLowerCase();
      if(!nomeNorm) return {...parte, clienteId:null};
      const existente = clientesAtuais.find(c=>c.nome.trim().toLowerCase()===nomeNorm)
        || clientesNovos.find(c=>c.nome.trim().toLowerCase()===nomeNorm);
      if(existente) return {...parte, clienteId: existente.id};
      const novoCliente = {id: Date.now()+clientesNovos.length*7+Math.floor(Math.random()*1000), nome: parte.nome.trim(), cpf:"", email:"", telefone:"", endereco:"", obs:"Criado automaticamente ao marcar como cliente em um processo."};
      clientesNovos.push(novoCliente);
      return {...parte, clienteId: novoCliente.id};
    }
    return parte;
  });
  if(clientesNovos.length && setClientes) setClientes(cs=>[...cs, ...clientesNovos]);
  return partesResolvidas;
}

const SEGMENTO_DATAJUD = {
  "1": "trf", "2": "trt", "3": "tse", "4": "stm", "5": "tjmrs", "8": "tj", "9": "trf",

function detectarIndiceDataJud(numero){
  const limpo = (numero||"").replace(/\D/g,"");
  if(limpo.length < 20) return "api_publica_tjrj";
  const segmento = limpo.charAt(13);
  const tribunal = limpo.slice(14,16);
  if(segmento === "8"){
    if(tribunal === "19") return "api_publica_tjrj";

function tentarAcharProcessoPorTexto(texto, processos){
  const matchNum = texto.match(/\d{7}-?\d{0,2}\.?\d{0,4}\.?\d\.?\d{2}\.?\d{4}/);
  if(!matchNum) return null;
  const num = matchNum[0].replace(/\D/g,"");
  return processos.find(p=>{
    const pNum = p.numero.replace(/\D/g,"");
    return pNum && (pNum===num || pNum.slice(0,15)===num.slice(0,15));
  }) || null;
}

function ColarProcessoIA({processos, clientes, setProcessos, setClientes, onAbrirProcesso}){
  const [aberto, setAberto] = useState(false);
  const [texto, setTexto] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [erro, setErro] = useState("");
  const [resultado, setResultado] = useState(null);
  const [novoProcEditavel, setNovoProcEditavel] = useState(null);
  const [clienteEscolhidoId, setClienteEscolhidoId] = useState("");

  const resetar = () => { setTexto(""); setResultado(null); setNovoProcEditavel(null); setErro(""); setClienteEscolhidoId(""); };

  const processar = async () => {
    if(!texto.trim()){ setErro("Cole o texto com as informações do processo."); return; }
    setErro(""); setCarregando(true); setResultado(null);
    const procExistente = tentarAcharProcessoPorTexto(texto, processos);
    try {
      const chamarIA = async (systemPrompt, userContent, maxTokens=1500) => {
        let res;
        try {
          res = await fetch(IA_PROXY_URL, {
            method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPABASE_KEY},
            body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:maxTokens, system:systemPrompt, messages:[{role:"user",content:userContent}] })
          });
        } catch(e){ throw new Error("Sem conexão com o serviço de IA — verifique a internet."); }
        if(!res.ok){
          let d=""; try{const b=await res.json();d=b?.error?.message||"";}catch(_){}
          throw new Error(`Erro HTTP ${res.status}.${d?` ${d}`:""}`);
        }
        const data = await res.json();
        const txt = data.content?.find(b=>b.type==="text")?.text||"";
        if(!txt) throw new Error("A IA retornou resposta vazia.");
        try{ return JSON.parse(txt.replace(/```json|```/g,"").trim()); }
        catch(e){ throw new Error(`JSON inválido na resposta da IA. Início: "${txt.slice(0,120)}"`); }
      };
      if(procExistente){
        const parsed = await chamarIA(
          `Você extrai movimentações/andamentos processuais de um texto colado. Retorne SOMENTE um JSON array, sem texto adicional:\n[{"data":"YYYY-MM-DD","desc":"texto do andamento"}]\nSe não houver data identificável, use string vazia. Não invente conteúdo.`,
          texto
        );
        setResultado({tipo:"existente", proc:procExistente, andamentos: Array.isArray(parsed)?parsed:[]});
      } else {
        const parsed = await chamarIA(
          `Você é um assistente jurídico. Extraia dados estruturados de processo a partir de um texto colado (pode ser intimação, consulta de tribunal, e-mail, relatório etc). Retorne SOMENTE um JSON válido, sem texto adicional:\n{"numero":"","autor":"","reu":"","vara":"","assunto":"","classificacao":"","valorCausa":"","andamento":{"data":"YYYY-MM-DD","desc":""}}\nUse string vazia quando não houver informação. Nunca invente dados não presentes no texto.`,
          texto
        );
        setResultado({tipo:"novo"});
        setNovoProcEditavel(parsed);
      }
    } catch(e){
      setErro(e.message || "Não foi possível interpretar o texto. Tente novamente ou cole um trecho mais claro.");
    }
    setCarregando(false);
  };

  const confirmarAndamentosExistente = () => {
    const { proc, andamentos } = resultado;
    const novos = andamentos.filter(a=>a.desc).map(a=>({data: a.data || hoje.toISOString().slice(0,10), desc: a.desc, fonte:"ia"}));
    if(novos.length===0){ setAberto(false); resetar(); return; }
    setProcessos(ps=>ps.map(p=>{
      if(p.id!==proc.id) return p;
      const mesclados = [...(p.andamentos||[]), ...novos].sort((a,b)=>(a.data||"").localeCompare(b.data||""));
      return {...p, andamentos: mesclados};
    }));
    setAberto(false); resetar();
    onAbrirProcesso(proc);
  };

  const confirmarNovoProcesso = () => {
    if(!novoProcEditavel.autor && !novoProcEditavel.numero){ alert("Preencha ao menos o autor ou o número do processo."); return; }
    let clienteId = clienteEscolhidoId ? parseInt(clienteEscolhidoId) : null;
    if(!clienteId && novoProcEditavel.autor){
      clienteId = Date.now();
      setClientes(cs=>[...cs, {id:clienteId, nome:novoProcEditavel.autor, cpf:"", email:"", telefone:"", endereco:"", obs:"Criado via colagem de texto na Visão Geral."}]);
    }
    const novoId = Date.now()+1;
    const andamentos = novoProcEditavel.andamento?.desc ? [{data: novoProcEditavel.andamento.data || hoje.toISOString().slice(0,10), desc: novoProcEditavel.andamento.desc, fonte:"ia"}] : [];
    setProcessos(ps=>[...ps, {
      id: novoId, clienteId, numero: novoProcEditavel.numero||"", tipo:"judicial",
      classificacao: novoProcEditavel.classificacao||"", autor: novoProcEditavel.autor||"", reu: novoProcEditavel.reu||"",
      vara: novoProcEditavel.vara||"", responsavel:"", status:"em_andamento", prazo:"", debito:null,
      assunto: novoProcEditavel.assunto||"", valorCausa: novoProcEditavel.valorCausa||"",
      andamentos, documentos:[], checklist:{}, obs:"Criado via colagem de texto na Visão Geral.",
    }]);
    setAberto(false); resetar();
    onAbrirProcesso({id:novoId});
  };

  if(!aberto){
    return (
      <button onClick={()=>setAberto(true)} style={{
        width:"100%", textAlign:"left", background:"#fff", border:"1px dashed var(--border2)", borderRadius:10,
        padding:"13px 16px", cursor:"pointer", marginBottom:14, display:"flex", alignItems:"center", gap:10,
        color:"var(--text2)", fontSize:12.5,
      }}>
        <span style={{fontSize:16}}>✨</span>
        <span>Colar informações de um processo (a IA identifica e cria, ou lança o andamento se já existir)…</span>
      </button>
    );
  }

  return (
    <div style={{background:"#fff", border:"1px solid var(--border1)", borderRadius:10, padding:"16px 18px", marginBottom:14}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
        <p style={{fontSize:12.5, fontWeight:700, color:"var(--text1)", margin:0}}>✨ Colar e processar com IA</p>
        <button onClick={()=>{setAberto(false);resetar();}} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--text3)",padding:0,lineHeight:1}}>×</button>
      </div>
      {!resultado && (
        <>
          <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Cole aqui o texto de uma intimação, consulta processual, e-mail, ou qualquer informação sobre um processo…" style={{width:"100%",minHeight:120,fontSize:12,padding:"10px",borderRadius:7,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",marginBottom:10}}/>
          {erro && <p style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{erro}</p>}
          <button onClick={processar} disabled={carregando} style={{...btnPri, opacity:carregando?.7:1}}>{carregando?"Analisando…":"✨ Processar"}</button>
        </>
      )}
      {resultado?.tipo==="existente" && (
        <div>
          <div style={{background:"var(--green-bg)", border:"1px solid #A8DDB8", borderRadius:7, padding:"10px 13px", marginBottom:12, fontSize:12.5, color:"var(--green)"}}>
            ✓ Processo já cadastrado encontrado: <strong>{resultado.proc.numero}</strong> — {resultado.proc.autor}
          </div>
          {resultado.andamentos.length===0 ? (
            <p style={{fontSize:12,color:"var(--text2)"}}>Nenhum andamento novo foi identificado no texto colado.</p>
          ) : (
            <div style={{display:"flex", flexDirection:"column", gap:6, marginBottom:12}}>
              {resultado.andamentos.map((a,i)=>(
                <div key={i} style={{border:"1px solid var(--border1)", borderRadius:6, padding:"8px 11px", fontSize:12}}>
                  <span style={{color:"var(--text2)", marginRight:8}}>{a.data?fmtData(a.data):"sem data"}</span>{a.desc}
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button onClick={()=>{setAberto(false);resetar();}} style={btnSec}>Cancelar</button>
            <button onClick={confirmarAndamentosExistente} style={btnPri}>+ Lançar no processo</button>
          </div>
        </div>
      )}
      {resultado?.tipo==="novo" && novoProcEditavel && (
        <div>
          <div style={{background:"var(--accent-light)", border:"1px solid #C5DCF2", borderRadius:7, padding:"10px 13px", marginBottom:12, fontSize:12.5, color:"var(--accent)"}}>

          <div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:12}}>
            <div><span style={lbl}>Número do processo</span><input value={novoProcEditavel.numero||""} onChange={e=>setNovoProcEditavel(x=>({...x,numero:e.target.value}))} style={inp}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div><span style={lbl}>Autor</span><input value={novoProcEditavel.autor||""} onChange={e=>setNovoProcEditavel(x=>({...x,autor:e.target.value}))} style={inp}/></div>
              <div><span style={lbl}>Réu</span><input value={novoProcEditavel.reu||""} onChange={e=>setNovoProcEditavel(x=>({...x,reu:e.target.value}))} style={inp}/></div>
            </div>
            <div><span style={lbl}>Vara</span><input value={novoProcEditavel.vara||""} onChange={e=>setNovoProcEditavel(x=>({...x,vara:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>Assunto</span><input value={novoProcEditavel.assunto||""} onChange={e=>setNovoProcEditavel(x=>({...x,assunto:e.target.value}))} style={inp}/></div>

              <span style={lbl}>Cliente (vincular existente, opcional)</span>
              <select value={clienteEscolhidoId} onChange={e=>setClienteEscolhidoId(e.target.value)} style={{...inp,padding:"7px 8px"}}>

                {[...clientes].sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR")).map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <button onClick={()=>{setAberto(false);resetar();}} style={btnSec}>Cancelar</button>

  );

function MiniBarChart({data, height=120}){
  const max = Math.max(...data.map(d=>d.value), 1);
  const w = 100/data.length;
  return (
    <svg viewBox={`0 0 100 ${height}`} style={{width:"100%",height,overflow:"visible"}} preserveAspectRatio="none">
      {data.map((d,i)=>{
        const barH = (d.value/max) * (height-22);
        return (
          <g key={i}>
            <rect x={i*w+w*0.18} y={height-22-barH} width={w*0.64} height={barH} rx={2} fill={d.color||"var(--accent)"}/>
            <text x={i*w+w/2} y={height-8} textAnchor="middle" fontSize="6" fill="var(--text2)">{d.label}</text>
            <text x={i*w+w/2} y={height-22-barH-4} textAnchor="middle" fontSize="6.5" fontWeight="700" fill="var(--text1)">{d.value}</text>
          </g>
        );
      })}
    </svg>
  );
}

function DonutChart({data, size=130}){
  const total = data.reduce((s,d)=>s+d.value,0) || 1;
  let cumulative = 0;
  const r = size/2 - 12, cx = size/2, cy = size/2;
  const circ = 2*Math.PI*r;
  return (
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg3)" strokeWidth="16"/>
        {data.map((d,i)=>{
          const frac = d.value/total;
          const dash = frac*circ;
          const offset = -cumulative*circ;
          cumulative += frac;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth="16" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={offset} transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt"/>;
        })}
        <text x={cx} y={cy-2} textAnchor="middle" fontSize="20" fontWeight="700" fill="var(--text1)">{total}</text>
        <text x={cx} y={cy+13} textAnchor="middle" fontSize="8" fill="var(--text2)">processos</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:"var(--text2)"}}>{d.label}</span>
            <span style={{fontSize:11,fontWeight:700,color:"var(--text1)",marginLeft:"auto"}}>{d.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function buscarProcessoPorTextoLivre(texto, processos){
  const txt = texto.toLowerCase();
  const matchNum = texto.match(/\d{7}-?\d{0,2}\.?\d{0,4}\.?\d\.?\d{2}\.?\d{4}/);
  if(matchNum){
    const num = matchNum[0].replace(/\D/g,"");
    const achado = processos.find(p=>p.numero.replace(/\D/g,"")===num);
    if(achado) return achado;
  }
  let melhor = null, melhorScore = 0;
  processos.forEach(p=>{
    const nomes = [p.autor||"", p.reu||""].join(" ").toLowerCase().split(/\s+/).filter(w=>w.length>3);
    const score = nomes.filter(n=>txt.includes(n)).length;
    if(score>melhorScore){ melhorScore=score; melhor=p; }
  });
  return melhorScore>0 ? melhor : null;
}
function CaixaEntradaIA({processos, clientes, setProcessos, setClientes, onAbrirProcesso}){
  const [texto, setTexto] = useState("");
  const [processando, setProcessando] = useState(false);
  const [erro, setErro] = useState("");
  const [proposta, setProposta] = useState(null);

  const interpretar = async () => {
    if(!texto.trim()){ setErro("Cole ou digite alguma informação antes de processar."); return; }
    setErro(""); setProcessando(true); setProposta(null);
    const candidato = buscarProcessoPorTextoLivre(texto, processos);
    try {
      const contextoExistente = candidato
        ? `\n\nPROCESSO JÁ CADASTRADO QUE PODE SER O MESMO (verifique pelo número/partes):\nNúmero: ${candidato.numero}\nAutor: ${candidato.autor}\nRéu: ${candidato.reu}\nAssunto: ${candidato.assunto||"—"}\nÚltimos andamentos: ${(candidato.andamentos||[]).slice(-3).map(a=>`${a.data}: ${a.desc}`).join(" | ")}`
        : "\n\nNenhum processo correspondente foi encontrado no sistema.";
      let res;
      try {
        res = await fetch(IA_PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + SUPABASE_KEY },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 2000,
            system: `Você organiza dados jurídicos colados por uma advogada brasileira. Retorne SOMENTE um JSON válido, sem texto adicional, sem markdown.

Decida se o texto colado descreve um PROCESSO NOVO (ainda não cadastrado) ou ATUALIZAÇÃO de um processo já existente (use o contexto fornecido abaixo para decidir).

Formato de saída:
{
  "acao": "criar" ou "atualizar",
  "numero": "número do processo se identificável, senão string vazia",
  "autor": "nome do autor/requerente, se identificável",
  "reu": "nome do réu/requerido, se identificável",
  "vara": "vara/órgão, se identificável",
  "assunto": "assunto/classe do processo, se identificável",
  "valorCausa": "valor numérico da causa sem formatação, ou vazio",
  "novosAndamentos": [{"data":"YYYY-MM-DD","desc":"..."}],
  "resumo": "frase curta explicando o que você entendeu e o que vai ser feito"
}

Datas devem estar em YYYY-MM-DD. Se não conseguir identificar uma data exata para um andamento, use a data de hoje (${hoje.toISOString().slice(0,10)}). Nunca invente número de processo, nomes ou valores que não estejam no texto. Se a ação for "atualizar", retorne apenas os campos que mudaram ou os novos andamentos — não repita dados que não mudaram.${contextoExistente}`,
            messages: [{role:"user", content: texto}]
          })
        });
      } catch(networkErr) {
        throw new Error("Não foi possível conectar ao serviço de IA — verifique sua conexão com a internet.");
      }
      if(!res.ok){
        let detalhe = "";
        try { const errBody = await res.json(); detalhe = errBody?.error?.message || ""; } catch(_){}
        throw new Error(`Erro HTTP ${res.status} ao chamar a IA.${detalhe?` Detalhe: ${detalhe}`:""}`);
      }
      const data = await res.json();
      const txt = data.content?.find(b=>b.type==="text")?.text || "";
      if(!txt) throw new Error("A IA retornou uma resposta vazia.");
      let parsed;
      try {
        parsed = JSON.parse(txt.replace(/```json|```/g,"").trim());
      } catch(parseErr) {
        throw new Error(`A resposta da IA não veio em formato JSON válido. Início da resposta: "${txt.slice(0,150)}"`);
      }
      setProposta({
        ...parsed,
        processoExistente: parsed.acao === "atualizar" ? candidato : null,
      });
    } catch(e) {
      setErro(e.message || "Não foi possível interpretar o texto. Tente novamente ou revise o conteúdo colado.");
    }
    setProcessando(false);
  };

  const [sucesso, setSucesso] = useState(null);

  const confirmar = () => {
    if(!proposta) return;
    if(proposta.acao === "atualizar" && proposta.processoExistente){
      const id = proposta.processoExistente.id;
      setProcessos(ps=>ps.map(p=>{
        if(p.id!==id) return p;
        const atualizado = {...p};
        if(proposta.assunto) atualizado.assunto = proposta.assunto;
        if(proposta.valorCausa) atualizado.valorCausa = proposta.valorCausa;
        if(proposta.novosAndamentos?.length){
          atualizado.andamentos = [...(p.andamentos||[]), ...proposta.novosAndamentos.map(a=>({...a, fonte:"ia"}))]
            .sort((a,b)=>(a.data||"").localeCompare(b.data||""));
        }
        return atualizado;
      }));
      setTexto("");
      setSucesso({id, numero: proposta.processoExistente.numero, novo:false});
      setProposta(null);
    } else {
      const novoId = Date.now();
      setProcessos(ps=>[...ps, {
        id: novoId, clienteId: "", numero: proposta.numero||"", tipo:"judicial", classificacao:"",
        autor: proposta.autor||"", reu: proposta.reu||"", vara: proposta.vara||"",
        responsavel:"", status:"em_andamento", prazo:"", debito:null,
        assunto: proposta.assunto||"", valorCausa: proposta.valorCausa||"",
        andamentos: (proposta.novosAndamentos||[]).map(a=>({...a, fonte:"ia"})),
        documentos:[], checklist:{}, obs:"Criado via Caixa de Entrada Inteligente.",
      }]);
      setTexto("");
      setSucesso({id: novoId, numero: proposta.numero||"(sem número)", novo:true});
      setProposta(null);
    }
  };

  return (
    <div style={{background:"#fff",border:"1px solid var(--border1)",borderRadius:10,padding:"16px 18px",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:16}}>✨</span>
        <p style={{fontSize:13,fontWeight:700,color:"var(--text1)",margin:0}}>Caixa de entrada inteligente</p>
      </div>
      <p style={{fontSize:11.5,color:"var(--text2)",margin:"0 0 10px",lineHeight:1.5}}>
        Cole uma intimação, relatório de andamento ou dados de um caso novo. A IA identifica se deve criar um processo ou atualizar um já existente.
      </p>
      {sucesso && (
        <div style={{marginBottom:10,padding:"10px 12px",background:"var(--green-bg)",border:"1px solid #A8DDB8",borderRadius:6,fontSize:12,color:"var(--green)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <span>✓ {sucesso.novo?"Processo criado":"Andamento lançado"} — {sucesso.numero}</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>onAbrirProcesso({id:sucesso.id})} style={{...btnSec,fontSize:10.5,padding:"4px 10px"}}>Ver processo</button>
            <button onClick={()=>setSucesso(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--green)",fontSize:15,padding:0,lineHeight:1}}>×</button>
          </div>
        </div>
      )}
      <textarea
        value={texto}
        onChange={e=>setTexto(e.target.value)}
        placeholder="Cole aqui o texto…"
        style={{width:"100%",minHeight:90,fontSize:12.5,padding:"10px 12px",borderRadius:7,border:"1px solid var(--border2)",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}
      />
      {erro && <div style={{marginTop:8,padding:"10px 12px",background:"var(--red-bg)",border:"1px solid #FCA5A5",borderRadius:6,fontSize:12,color:"var(--red)",lineHeight:1.5}}><strong>Erro:</strong> {erro}</div>}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
        <button onClick={interpretar} disabled={processando} style={{...btnPri,opacity:processando?.7:1,fontSize:12.5,padding:"8px 18px"}}>
          {processando?"Analisando…":"✨ Interpretar com IA"}
        </button>
      </div>
      {proposta && (
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <Pill bg={proposta.acao==="criar"?"var(--green-bg)":"var(--accent-light)"} color={proposta.acao==="criar"?"var(--green)":"var(--accent)"} label={proposta.acao==="criar"?"Novo processo":"Atualizar processo existente"} sm/>
          </div>
          <p style={{fontSize:12.5,color:"var(--text1)",margin:"0 0 12px",lineHeight:1.5}}>{proposta.resumo}</p>
          {proposta.acao==="atualizar" && proposta.processoExistente && (
            <div style={{background:"var(--bg2)",borderRadius:6,padding:"10px 12px",marginBottom:10,fontSize:11.5}}>
              <p style={{margin:"0 0 3px",fontFamily:"monospace",color:"var(--text2)"}}>{proposta.processoExistente.numero}</p>
              <p style={{margin:0,fontWeight:600}}>{proposta.processoExistente.autor} vs. {proposta.processoExistente.reu}</p>
            </div>
          )}
          {proposta.acao==="criar" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px",marginBottom:10,fontSize:12}}>
              {proposta.numero&&<div><span style={{color:"var(--text2)"}}>Número: </span><span style={{fontFamily:"monospace"}}>{proposta.numero}</span></div>}
              {proposta.autor&&<div><span style={{color:"var(--text2)"}}>Autor: </span>{proposta.autor}</div>}
              {proposta.reu&&<div><span style={{color:"var(--text2)"}}>Réu: </span>{proposta.reu}</div>}
              {proposta.vara&&<div><span style={{color:"var(--text2)"}}>Vara: </span>{proposta.vara}</div>}
              {proposta.assunto&&<div style={{gridColumn:"1/-1"}}><span style={{color:"var(--text2)"}}>Assunto: </span>{proposta.assunto}</div>}
            </div>
          )}
          {proposta.novosAndamentos?.length>0 && (
            <div style={{marginBottom:12}}>
              <p style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--text2)",margin:"0 0 6px"}}>Andamento(s) a adicionar</p>
              {proposta.novosAndamentos.map((a,i)=>(
                <div key={i} style={{display:"flex",gap:10,fontSize:12,marginBottom:4}}>
                  <span style={{color:"var(--text2)",whiteSpace:"nowrap"}}>{fmtData(a.data)}</span>
                  <span>{a.desc}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setProposta(null)} style={btnSec}>Cancelar</button>
            <button onClick={confirmar} style={btnPri}>✓ Confirmar e salvar</button>
          </div>
        </div>
      )}
    </div>
  );
}
function PaginaDashboard({processos, parcelas, clientes, tarefas, agenda, equipe, onAbrirProcesso, onIrPara, setProcessos, setClientes, onVerPrazoRapido}){
  const tarefasPendentes = (tarefas||[]).filter(t=>t.status!=="concluido");
  const tarefasAtrasadas = tarefasPendentes.filter(t=>t.prazo&&diasRest(t.prazo)<0);
  const hojeStr = hoje.toISOString().slice(0,10);
  const compromissosHoje = (agenda||[]).filter(c=>c.dataHora&&c.dataHora.slice(0,10)===hojeStr);
  const ativos = processos.filter(p=>normalizarStatus(p.status)!=="encerrado");
  const urgentes = processos.filter(isUrgProc);

  const porClassif = {};
  processos.forEach(p=>{ const chave = p.classificacao || "_outros"; porClassif[chave]=(porClassif[chave]||0)+1; });
  const classifChart = Object.entries(porClassif)
    .map(([k,v])=>({key:k,label:k==="_outros"?"Outros":(CC[k]?.label||k),value:v,color:k==="_outros"?"#9CA3AF":(CC[k]?.border||"#999")}))
    .sort((a,b)=>{ if(a.key==="_outros") return 1; if(b.key==="_outros") return -1; return b.value-a.value; });

  const prazosAbertos = processos
    .filter(p=>p.prazoProcessual?.ativo && p.situacaoArquivo!=="baixado_definitivo" && normalizarStatus(p.status)!=="encerrado")
    .filter(p=>diasRest(p.prazoProcessual.vencimento)>=-9999 && diasRest(p.prazoProcessual.vencimento)<=30)
    .map(p=>({proc:p,tipo:p.prazoProcessual.proximoAto,data:p.prazoProcessual.vencimento,desc:p.prazoProcessual.parte}))
    .sort((a,b)=>diasRest(a.data)-diasRest(b.data));

  const totalVencidoFin = parcelas.filter(p=>statusParcela(p)==="vencido").reduce((a,p)=>a+p.valor,0);
  const mesAtualStr = hoje.toISOString().slice(0,7);
  const parcelasMesAtual = parcelas.filter(p=>(p.vencimento||"").slice(0,7)===mesAtualStr);
  const recebidoMes = parcelasMesAtual.filter(p=>p.pago).reduce((a,p)=>a+p.valor,0);
  const abertoMes = parcelasMesAtual.filter(p=>!p.pago).reduce((a,p)=>a+p.valor,0);
  const previsaoMes = recebidoMes + abertoMes;

  const ultimasMovs = processos
    .flatMap(p=>(p.andamentos||[]).map(a=>({...a,proc:p})))
    .sort((a,b)=>b.data.localeCompare(a.data))
    .slice(0,6);

  // Unifica a visão de prazos: como todo prazo (manual, via IA, ou "Analisar prazo")
  // já vira uma tarefa vinculada, usamos "tarefas" como fonte única da verdade dos prazos.
  const itensComPrazo = (tarefas||[]).filter(t=>!t.arquivada && t.status!=="concluido" && t.prazo);
  const prazosVencidosCard = itensComPrazo.filter(t=>diasRest(t.prazo)<0).sort((a,b)=>a.prazo.localeCompare(b.prazo));
  const prazosProximos7d = itensComPrazo.filter(t=>{const d=diasRest(t.prazo); return d>=0&&d<=7;}).sort((a,b)=>a.prazo.localeCompare(b.prazo));
  const prazosVencendoHoje = itensComPrazo.filter(t=>diasRest(t.prazo)===0).length;
  const prazosUrgentes3d = itensComPrazo.filter(t=>{const d=diasRest(t.prazo); return d>=0&&d<=3;}).length;
  const tagPorUrgencia = (t) => {
    const d = diasRest(t.prazo);
    if(d<0) return {label:"Vencido", bg:"var(--red-bg)", color:"var(--red)"};
    if(d<=1) return {label:"Urgente", bg:"var(--red-bg)", color:"var(--red)"};
    if(d<=3) return {label:"Atenção", bg:"var(--amber-bg)", color:"var(--amber)"};
    return {label:"Pendente", bg:"var(--bg2)", color:"var(--text2)"};
  };
  const clienteDeTarefa = (t) => {
    if(t.clienteId){ const c=clientes.find(x=>String(x.id)===String(t.clienteId)); if(c) return c.nome; }
    if(t.procId){ const proc=processos.find(p=>String(p.id)===String(t.procId)); if(proc?.clienteId){ const c=clientes.find(x=>x.id===proc.clienteId); if(c) return c.nome; } }
    return null;
  };
  const abrirTarefaDashboard = (t) => onVerPrazoRapido(t);

  const compromissosHojeOrdenados = [...compromissosHoje].sort((a,b)=>new Date(a.dataHora)-new Date(b.dataHora));

  // Comparativo financeiro com o mês anterior
  const dataMesAnterior = new Date(hoje.getFullYear(), hoje.getMonth()-1, 1);
  const mesAnteriorStr = `${dataMesAnterior.getFullYear()}-${String(dataMesAnterior.getMonth()+1).padStart(2,"0")}`;
  const parcelasMesAnterior = parcelas.filter(p=>(p.vencimento||"").slice(0,7)===mesAnteriorStr);
  const recebidoMesAnterior = parcelasMesAnterior.filter(p=>p.pago).reduce((a,p)=>a+p.valor,0);
  const variacaoRecebido = recebidoMesAnterior>0 ? Math.round(((recebidoMes-recebidoMesAnterior)/recebidoMesAnterior)*100) : null;

  const AlertCard = ({titulo, corIcone, corBg, icone, numero, sub, itens, verTodosLabel, onVerTodos, vazio}) => (
    <div style={{background:"#fff",borderRadius:10,border:"1px solid var(--border1)",padding:"18px 20px",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <p style={{fontSize:11,fontWeight:700,color:corIcone,textTransform:"uppercase",letterSpacing:".5px",margin:0,display:"flex",alignItems:"center",gap:6}}>{icone==="⚠"?"⚠":icone==="⏱"?"⏱":"📅"} {titulo}</p>
        <div style={{width:34,height:34,borderRadius:"50%",background:corBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{icone}</div>
      </div>
      <p style={{fontSize:30,fontWeight:800,margin:"0 0 2px",color:"var(--text1)",letterSpacing:"-.02em"}}>{numero}</p>
      <p style={{fontSize:11.5,color:corIcone,fontWeight:600,margin:"0 0 12px"}}>{sub}</p>
      <div style={{display:"flex",flexDirection:"column",gap:0,flex:1}}>
        {itens.length===0 ? (
          <p style={{fontSize:12,color:"var(--text3)"}}>{vazio}</p>
        ) : itens.slice(0,3).map((el,i)=>(
          <div key={i} onClick={el.onClick} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"8px 0",borderTop:"1px solid var(--border1)",cursor:el.onClick?"pointer":"default"}}>
            <div style={{minWidth:0}}>
              <p style={{fontSize:12,fontWeight:600,margin:"0 0 2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{el.titulo}</p>
              <p style={{fontSize:10.5,color:"var(--text2)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{el.sub}</p>
            </div>
            {el.tag && <span style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:20,background:el.tag.bg,color:el.tag.color,whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:".3px"}}>{el.tag.label}</span>}
          </div>
        ))}
      </div>
      {onVerTodos && <div onClick={onVerTodos} style={{marginTop:10,paddingTop:10,borderTop:itens.length===0?"none":"1px solid var(--border1)",fontSize:11.5,fontWeight:600,color:"var(--accent)",cursor:"pointer"}}>{verTodosLabel} →</div>}
    </div>
  );

  return (
    <div>
      <div style={{marginBottom:18}}>
        <h1 style={{fontSize:22,fontWeight:700,color:"var(--text1)",margin:"0 0 3px",letterSpacing:"-.02em"}}>Visão geral</h1>
        <p style={{fontSize:12.5,color:"var(--text2)",margin:0}}>{hoje.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
      </div>

      <CaixaEntradaIA processos={processos} clientes={clientes} setProcessos={setProcessos} setClientes={setClientes} onAbrirProcesso={onAbrirProcesso}/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
        <AlertCard
          titulo="Prazos vencidos" corIcone="var(--red)" corBg="var(--red-bg)" icone="⚠"
          numero={prazosVencidosCard.length} sub="requer atenção imediata"
          itens={prazosVencidosCard.map(t=>({titulo:t.titulo, sub:clienteDeTarefa(t)||"—", tag:tagPorUrgencia(t), onClick:()=>abrirTarefaDashboard(t)}))}
          vazio="Nenhum prazo vencido. 🎉"
          verTodosLabel="Ver todos os prazos vencidos" onVerTodos={()=>onIrPara("tarefas")}
        />
        <AlertCard
          titulo="Prazos próximos (7d)" corIcone="var(--amber)" corBg="var(--amber-bg)" icone="⏱"
          numero={prazosProximos7d.length} sub={`${prazosVencendoHoje} vencem hoje · ${prazosUrgentes3d} urgentes`}
          itens={prazosProximos7d.map(t=>({titulo:t.titulo, sub:clienteDeTarefa(t)||"—", tag:tagPorUrgencia(t), onClick:()=>abrirTarefaDashboard(t)}))}
          vazio="Nenhum prazo nos próximos 7 dias."
          verTodosLabel="Ver todos os prazos de hoje" onVerTodos={()=>onIrPara("tarefas")}
        />
        <AlertCard
          titulo="Compromissos de hoje" corIcone="var(--green)" corBg="var(--green-bg)" icone="📅"
          numero={compromissosHojeOrdenados.length} sub={(equipe||[]).length+" na equipe"}
          itens={compromissosHojeOrdenados.map(c=>({titulo:c.titulo, sub:new Date(c.dataHora).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}), tag:TIPO_AGENDA_CFG[c.tipo]?{label:TIPO_AGENDA_CFG[c.tipo].label,bg:TIPO_AGENDA_CFG[c.tipo].bg,color:TIPO_AGENDA_CFG[c.tipo].color}:null}))}
          vazio="Nenhum compromisso para hoje."
          verTodosLabel="Ver agenda completa" onVerTodos={()=>onIrPara("agenda")}
        />
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
        <KpiCard label="Processos ativos" value={ativos.length} sub={`de ${processos.length} no total`} color="var(--navy2)" icon="📂" onClick={()=>onIrPara("processos")}/>
        <KpiCard label="Prazos urgentes ≤7d" value={urgentes.length} sub="requer atenção imediata" color="var(--red)" icon="⚠" onClick={()=>onIrPara("processos")}/>
        <KpiCard label="Clientes ativos" value={clientes.length} sub="cadastrados no CRM" color="var(--purple)" icon="👤" onClick={()=>onIrPara("clientes")}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:16}}>
        <KpiCard label="Prazos e tarefas pendentes" value={tarefasPendentes.length} sub={tarefasAtrasadas.length>0?`${tarefasAtrasadas.length} atrasada(s)`:"em dia"} color={tarefasAtrasadas.length>0?"var(--red)":"var(--accent)"} icon="✅" onClick={()=>onIrPara("tarefas")}/>
        <KpiCard label="Compromissos hoje" value={compromissosHoje.length} sub={(equipe||[]).length+" na equipe"} color="var(--green)" icon="📅" onClick={()=>onIrPara("agenda")}/>
      </div>

      {prazosAbertos.filter(p=>diasRest(p.data)<0).length>0&&(

function ModalAcaoLote({tipo, qtd, clientes, classificacoes, onAplicar, onClose}){
  const [valor,setValor]=useState("");
  const cfg = {
    arquivar: {titulo:"Arquivar processos", label:"Situação do arquivamento", opcoes:[["baixado_definitivo","Baixado definitivamente"],["ag_prescricao","Aguardando prescrição"],["arquivado","Outro motivo"]]},
    status: {titulo:"Mudar status", label:"Novo status", opcoes:STATUS_VALIDOS.map(k=>[k,SC[k].label])},
    classificacao: {titulo:"Mudar classificação", label:"Nova classificação", opcoes:classificacoes.map(k=>[k,CC[k]?.label||k])},
    responsavel: {titulo:"Atribuir responsável", label:"Responsável (digite o nome)", texto:true},
    cliente: {titulo:"Vincular a cliente", label:"Cliente", opcoes:[...clientes].sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR")).map(c=>[String(c.id),c.nome])},
  }[tipo];
  if(!cfg) return null;
  const aplicar = () => {
    if(tipo==="arquivar") onAplicar({tipo:"arquivar",valor:valor||"arquivado"});
    else if(tipo==="status") onAplicar({tipo:"status",valor});
    else if(tipo==="classificacao") onAplicar({tipo:"classificacao",valor});
    else if(tipo==="responsavel") onAplicar({tipo:"responsavel",valor});
    else if(tipo==="cliente") onAplicar({tipo:"cliente",valor});
  };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,17,23,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:"1.5rem",width:420,maxWidth:"90vw"}}>
        <h3 style={{fontSize:16,fontWeight:700,color:"var(--text1)",margin:"0 0 4px"}}>{cfg.titulo}</h3>
        <p style={{fontSize:12.5,color:"var(--text2)",margin:"0 0 16px"}}>Aplicar a <strong>{qtd}</strong> processo(s) selecionado(s).</p>
        <label style={{fontSize:11,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".5px",display:"block",marginBottom:6}}>{cfg.label}</label>
        {cfg.texto ? (
          <input autoFocus value={valor} onChange={e=>setValor(e.target.value)} placeholder="Ex: Beatriz" style={{...inp,marginBottom:18}}/>
        ) : (
          <select autoFocus value={valor} onChange={e=>setValor(e.target.value)} style={{...inp,marginBottom:18}}>
            <option value="">{tipo==="cliente"?"Nenhum (desvincular)":"Selecione…"}</option>
            {cfg.opcoes.map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        )}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnSec}>Cancelar</button>
          <button onClick={aplicar} disabled={!cfg.texto && tipo!=="cliente" && tipo!=="arquivar" && !valor} style={{...btnPri,opacity:(!cfg.texto && tipo!=="cliente" && tipo!=="arquivar" && !valor)?.5:1}}>Aplicar a {qtd}</button>
        </div>
      </div>
    </div>
  );
}
