  const [parcelas, setParcelas] = useState([]);
  const [despesas, setDespesas] = useState([]);
  const [tarefas, setTarefas] = useState([]);
  const [agenda, setAgenda] = useState([]);
  const [equipe, setEquipe] = useState([]);
  const [intimacoes, setIntimacoes] = useState([]);
  const [mapas, setMapas] = useState({});
  const [classificacoesCustom, setClassificacoesCustom] = useState([]);
  const [abrirProcessoId, setAbrirProcessoId] = useState(null);
  const [clienteParaAbrir, setClienteParaAbrir] = useState(false);
  const [novoClienteAoAbrir, setNovoClienteAoAbrir] = useState(false);

  const saveTimer = React.useRef({});
  const googleTokenClientRef = React.useRef(null);
  const [googleToken, setGoogleToken] = useState(null);
  const [googleSincronizando, setGoogleSincronizando] = useState(false);
  const [googleUltimaSinc, setGoogleUltimaSinc] = useState(null);
  const [googleErro, setGoogleErro] = useState("");

  const eventoGoogleParaCompromisso = (ev) => {
    const inicio = ev.start?.dateTime || (ev.start?.date ? ev.start.date+"T00:00" : null);
    if(!inicio) return null;
    return {
      titulo: ev.summary || "(sem título)",
      tipo: "outro",
      dataHora: inicio.slice(0,16),
      local: ev.location || "",
      obs: ev.description || "",
      googleEventId: ev.id,
      origemGoogle: true,
    };
  };

  const enviarCompromissoAoGoogle = React.useCallback(async (compromisso, token) => {
    const tk = token || googleToken;
    if(!tk) return null;
    const corpo = {
      summary: compromisso.titulo,
      location: compromisso.local || undefined,
      description: compromisso.obs || undefined,
      start: { dateTime: new Date(compromisso.dataHora).toISOString() },
      end: { dateTime: new Date(new Date(compromisso.dataHora).getTime()+60*60*1000).toISOString() },
    };
    try {
      const url = compromisso.googleEventId
        ? `https://www.googleapis.com/calendar/v3/calendars/primary/events/${compromisso.googleEventId}`
        : `https://www.googleapis.com/calendar/v3/calendars/primary/events`;
      const res = await fetch(url, {
        method: compromisso.googleEventId ? "PATCH" : "POST",
        headers: { Authorization: `Bearer ${tk}`, "Content-Type": "application/json" },
        body: JSON.stringify(corpo),
      });
      if(!res.ok) return null;
      const data = await res.json();
      return data.id;
    } catch(e) {
      console.error("Erro ao enviar compromisso ao Google Agenda:", e);
      return null;
    }
  }, [googleToken]);

  const excluirEventoNoGoogle = React.useCallback(async (googleEventId, token) => {
    const tk = token || googleToken;
    if(!tk || !googleEventId) return;
    try {
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${googleEventId}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${tk}` },
      });
    } catch(e) { console.error("Erro ao excluir evento no Google Agenda:", e); }
  }, [googleToken]);

  const sincronizarComGoogle = React.useCallback(async (tokenParam) => {
    const tk = tokenParam || googleToken;
    if(!tk) return;
    setGoogleSincronizando(true);
    setGoogleErro("");
    try {
      const timeMin = new Date(Date.now() - 30*864e5).toISOString();
      const timeMax = new Date(Date.now() + 180*864e5).toISOString();
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&maxResults=250`, {
        headers: { Authorization: `Bearer ${tk}` },
      });
      if(!res.ok) throw new Error(`Erro ${res.status} ao buscar eventos do Google Agenda. Tente conectar novamente.`);
      const data = await res.json();
      const eventosGoogle = (data.items || []).filter(ev => ev.status !== "cancelled");

      let agendaAtualAposMerge = null;
      setAgenda(ag => {
        let atualizada = [...ag];
        eventosGoogle.forEach((ev, i) => {
          const convertido = eventoGoogleParaCompromisso(ev);
          if(!convertido) return;
          const idx = atualizada.findIndex(c => c.googleEventId === ev.id);
          if(idx >= 0) atualizada[idx] = { ...atualizada[idx], ...convertido, id: atualizada[idx].id };
          else atualizada.push({ ...convertido, id: Date.now()+i*11+Math.floor(Math.random()*1000) });
        });
        agendaAtualAposMerge = atualizada;
        return atualizada;
      });

      // Envia para o Google os compromissos criados aqui que ainda não têm evento vinculado
      const paraEnviar = (agendaAtualAposMerge || agenda).filter(c => !c.googleEventId);
      for (const c of paraEnviar) {
        const idEvento = await enviarCompromissoAoGoogle(c, tk);
        if(idEvento) setAgenda(ag => ag.map(x => x.id===c.id ? {...x, googleEventId: idEvento} : x));
      }

      setGoogleUltimaSinc(new Date());
    } catch(e) {
      setGoogleErro(e.message || "Erro ao sincronizar com o Google Agenda.");
    }
    setGoogleSincronizando(false);
  }, [googleToken, agenda, enviarCompromissoAoGoogle]);

  const conectarGoogle = () => {
    setGoogleErro("");
    if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
      setGoogleErro("A biblioteca do Google ainda não carregou — aguarde alguns segundos e tente de novo.");
      return;
    }
    if(!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.includes("SEU_CLIENT_ID")){
      setGoogleErro("Configure o GOOGLE_CLIENT_ID no topo do código antes de conectar (veja as instruções que a Michelli te passou).");
      return;
    }
    if(!googleTokenClientRef.current){
      googleTokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/calendar.events",
        callback: (resp) => {
          if(resp.error){ setGoogleErro("Erro ao autorizar: " + resp.error); return; }
          setGoogleToken(resp.access_token);
          sincronizarComGoogle(resp.access_token);
        },
      });
    }
    googleTokenClientRef.current.requestAccessToken({ prompt: googleToken ? "" : "consent" });
  };

  const desconectarGoogle = () => {
    if(googleToken && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(googleToken, ()=>{});
    }
    setGoogleToken(null);
    setGoogleUltimaSinc(null);
  };
  const sincStatusRef = React.useRef("ocioso");
  const [sincStatus, setSincStatus] = useState("ocioso");

  React.useEffect(()=>{
    let ativo = true;
    (async () => {
      if(!sb){ setErroCarregamento(sbErroInicial||"Sem conexão com o banco."); setCarregandoDados(false); return; }
      try {
        const tabelas = ["processos","clientes","parcelas","despesas","tarefas","agenda","equipe","intimacoes"];
        // Cada tabela é carregada de forma independente: se uma tabela ainda não existir no
        // Supabase (ex: "intimacoes" não criada), o sistema não trava inteiro — só aquela
        // parte fica vazia, e um aviso aparece no rodapé da barra lateral.
        const resultados = await Promise.all(tabelas.map(async t=>{
          try {
            const r = await sb.from(t).select("*").eq("user_id", uidUser);
            if(r.error) throw r.error;
            return r;
          } catch(e){
            console.warn(`Aviso: não foi possível carregar a tabela "${t}" (${e.message||e}). Usando lista vazia.`);
            return { data: [], error: null, _tabelaFaltando: t };
          }
        }));
        const tabelasFaltando = resultados.filter(r=>r._tabelaFaltando).map(r=>r._tabelaFaltando);
        if(tabelasFaltando.length) setAvisoTabelasFaltando(tabelasFaltando);
        if(!ativo) return;
        const [rProc, rCli, rParc, rDesp, rTar, rAg, rEq, rInt] = resultados;
        const parseCampo = (v, fallback) => { if(v===undefined||v===null) return fallback; if(typeof v==="string"){ try { return JSON.parse(v); } catch(_) { return fallback; } } return v; };
        // Importante: NUNCA cair de volta para os dados de teste (PROCS0/CLIENTES0/FINANC0/EQUIPE0)
        // quando a tabela estiver vazia — isso fazia os dados de teste "reaparecerem" toda vez
        // que a usuária excluía tudo de uma tabela e reabria o painel. Tabela vazia = lista vazia mesmo.
        setProcessos((rProc.data||[]).map(p=>({
          ...p,
          andamentos: parseCampo(p.andamentos, []),
          partes: parseCampo(p.partes, []),
          checklist: parseCampo(p.checklist, {}),
          exitos: parseCampo(p.exitos, []),
          debito: parseCampo(p.debito, null),
          documentos: parseCampo(p.documentos, []),
          docChecklist: parseCampo(p.docChecklist, []),
          prazoProcessual: parseCampo(p.prazoProcessual, null),
          audiencia: parseCampo(p.audiencia, null),
          vinculo: parseCampo(p.vinculo, null),
        })));
        setClientes(rCli.data||[]);
        setParcelas(rParc.data||[]);
        setDespesas(rDesp.data||[]);
        setTarefas(rTar.data||[]);
        setAgenda(rAg.data||[]);
        setEquipe(rEq.data||[]);
        setIntimacoes(rInt.data||[]);
      } catch(e) {
        setErroCarregamento(e.message || "Erro ao carregar dados.");
      }
      if(ativo) setCarregandoDados(false);
    })();
    return () => { ativo = false; };
  },[uidUser]);

  // Cada tabela só deve receber os campos JSON que de fato existem nela.
  // "tarefas", "agenda", "clientes" etc. não têm colunas como "andamentos" ou "checklist" —
  // tentar enviá-las (mesmo como undefined) já causava erro "column not found" no Supabase.
  const CAMPOS_JSON_POR_TABELA = {
    processos: ["andamentos","partes","checklist","exitos","debito","documentos","docChecklist","prazoProcessual","audiencia","vinculo"],
  };

  const autoSave = React.useCallback((tabela, dados, delay=1200) => {
    if(carregandoDados) return;
    if(!Array.isArray(dados)) return;
    clearTimeout(saveTimer.current[tabela]);
    setSincStatus("salvando");
    saveTimer.current[tabela] = setTimeout(async()=>{
      try {
        if(dados.length>0){
          const camposJSON = CAMPOS_JSON_POR_TABELA[tabela] || [];
          const comUser = dados.map(d=>{
            const s = sanitizarParaSupabase(d);
            const extra = {};
            camposJSON.forEach(campo=>{
              if(s[campo]!==undefined) extra[campo] = JSON.stringify(s[campo]);
            });
            return {...s, user_id:uidUser, ...extra};
          });
          const { error } = await sb.from(tabela).upsert(comUser, {onConflict:"id"});
          if(error) throw error;
        }
        setSincStatus("salvo");
        setTimeout(()=>setSincStatus(s=>s==="salvo"?"ocioso":s), 2000);
      } catch(e) {
        console.error(`Erro ao salvar ${tabela}:`, e);
        setSincStatus("erro:" + (e.message||"desconhecido"));
      }
    }, delay);
  }, [carregandoDados, uidUser]);

  React.useEffect(()=>{ autoSave("processos", processos); }, [processos]);
  React.useEffect(()=>{ autoSave("clientes", clientes); }, [clientes]);
  React.useEffect(()=>{ autoSave("parcelas", parcelas); }, [parcelas]);
  React.useEffect(()=>{ autoSave("despesas", despesas); }, [despesas]);
  React.useEffect(()=>{ autoSave("tarefas", tarefas); }, [tarefas]);
  React.useEffect(()=>{ autoSave("agenda", agenda); }, [agenda]);
  React.useEffect(()=>{ autoSave("equipe", equipe); }, [equipe]);
  React.useEffect(()=>{ autoSave("intimacoes", intimacoes); }, [intimacoes]);

  const abrirProcesso = (proc) => { setAbrirProcessoId(proc.id); setPagina("processos"); };

  // Visualização rápida de prazo/tarefa: abre por cima da página atual, sem navegar,
  // para que ao fechar a pessoa continue no Dashboard ou em Prazos e Tarefas.
  const [prazoRapido, setPrazoRapido] = useState(null);
  const concluirTarefaGlobal = (id) => setTarefas(ts=>ts.map(t=>t.id===id?{...t,status:"concluido"}:t));
  const irPara = (destino) => setPagina(destino);

  const NAV = [
    {id:"dashboard", label:"Visão Geral", icon:"house"},
    {id:"processos", label:"Processos", icon:"folder"},
    {id:"clientes", label:"Clientes", icon:"users"},
    {id:"tarefas", label:"Prazos e Tarefas", icon:"checkSquare"},
    {id:"agenda", label:"Agenda", icon:"calendar"},
    {id:"financeiro", label:"Financeiro", icon:"wallet"},
    {id:"relatorios", label:"Relatórios", icon:"barChart"},
    {id:"intimacoes", label:"Intimações", icon:"bell"},
    {id:"importacao", label:"Importação", icon:"upload"},
    {id:"equipe", label:"Equipe", icon:"usersRound"},
  ];

  if(carregandoDados){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text2)",fontSize:13}}>Carregando…</div>;
  }
  if(erroCarregamento){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{background:"var(--red-bg)",border:"1px solid #F3B8B8",borderRadius:8,padding:"1.5rem",maxWidth:420,fontSize:13,color:"var(--red)"}}>
        <strong>Erro ao carregar o sistema:</strong>
        <p style={{marginTop:8}}>{erroCarregamento}</p>
      </div>
    </div>;
  }

  return (
    <div id="root-app" style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <div className="sidebar" style={{width:224,background:"var(--navy)",borderRight:"1px solid #2A251E",padding:"26px 14px 20px",display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <img src={LOGO_MICHELLI_ABREU} alt="Michelli Abreu Advocacia" style={{width:"100%",maxWidth:170,margin:"0 8px 34px",display:"block"}}/>
        {NAV.map(n=>{
          const ativo = pagina===n.id;
          return (
            <div key={n.id} className="sidebar-item" onClick={()=>setPagina(n.id)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 12px",borderRadius:8,cursor:"pointer",marginBottom:3,position:"relative",background:ativo?"rgba(255,255,255,.06)":"transparent",color:ativo?"#fff":"rgba(255,255,255,.58)",fontSize:12.5,fontWeight:ativo?600:500,transition:"background .15s,color .15s"}}>
              {ativo && <span style={{position:"absolute",left:0,top:"20%",bottom:"20%",width:3,borderRadius:3,background:"var(--accent)"}}/>}
              <Icon name={n.icon} size={16} color={ativo?"#EADFD5":"rgba(255,255,255,.55)"}/>
              {n.label}
            </div>
          );
        })}
        <div style={{marginTop:"auto",paddingTop:16,borderTop:"1px solid rgba(255,255,255,.08)"}}>
          {avisoTabelasFaltando.length>0 && (
            <p style={{fontSize:9.5,color:"#D9B98A",margin:"0 8px 8px",lineHeight:1.4}}>
              ⚠ Tabela(s) não encontradas no Supabase: {avisoTabelasFaltando.join(", ")}. Essas áreas ficam vazias até a tabela ser criada.
            </p>
          )}
          <p style={{fontSize:10,color:"rgba(255,255,255,.35)",margin:"0 8px 6px",letterSpacing:".2px"}}>
            {sincStatus==="salvando"?"Salvando…":sincStatus==="salvo"?"✓ Salvo":sincStatus.startsWith("erro")?`⚠ ${sincStatus.slice(5)}`:"Sincronizado"}
          </p>
          <div onClick={()=>sb&&sb.auth.signOut()} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 12px",borderRadius:8,cursor:"pointer",color:"rgba(255,255,255,.45)",fontSize:12}}>
            <Icon name="logOut" size={15} color="rgba(255,255,255,.45)"/> Sair
          </div>
        </div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:"24px 32px"}}>
        {pagina==="dashboard" && <PaginaDashboard processos={processos} parcelas={parcelas} clientes={clientes} tarefas={tarefas} agenda={agenda} equipe={equipe} onAbrirProcesso={abrirProcesso} onIrPara={irPara} setProcessos={setProcessos} setClientes={setClientes} onVerPrazoRapido={setPrazoRapido}/>}
        {pagina==="processos" && <PaginaProcessos processos={processos} setProcessos={setProcessos} clientes={clientes} setClientes={setClientes} mapas={mapas} setMapas={setMapas} onNovoCliente={()=>{setPagina("clientes");setClienteParaAbrir(true);}} abrirProcessoId={abrirProcessoId} onProcessoAberto={()=>setAbrirProcessoId(null)} tarefas={tarefas} setTarefas={setTarefas} setAgenda={setAgenda} setParcelas={setParcelas} classificacoesCustom={classificacoesCustom} setClassificacoesCustom={setClassificacoesCustom}/>}
        {pagina==="clientes" && <PaginaClientes clientes={clientes} setClientes={setClientes} processos={processos} onAbrirProcesso={abrirProcesso} clienteParaAbrir={clienteParaAbrir} onClienteAberto={()=>setClienteParaAbrir(false)}/>}
        {pagina==="tarefas" && <PaginaTarefas tarefas={tarefas} setTarefas={setTarefas} processos={processos} clientes={clientes} equipe={equipe} onAbrirProcesso={abrirProcesso} onVerPrazoRapido={setPrazoRapido}/>}
        {pagina==="agenda" && <PaginaAgenda agenda={agenda} setAgenda={setAgenda} processos={processos} clientes={clientes} equipe={equipe} tarefas={tarefas} onAbrirProcesso={abrirProcesso} onIrParaTarefa={()=>setPagina("tarefas")} googleConectado={!!googleToken} googleSincronizando={googleSincronizando} googleUltimaSinc={googleUltimaSinc} googleErro={googleErro} onConectarGoogle={conectarGoogle} onDesconectarGoogle={desconectarGoogle} onSincronizarGoogle={()=>sincronizarComGoogle()} onEnviarAoGoogle={enviarCompromissoAoGoogle} onExcluirNoGoogle={excluirEventoNoGoogle}/>}
        {pagina==="financeiro" && <PaginaFinanceiro parcelas={parcelas} setParcelas={setParcelas} despesas={despesas} setDespesas={setDespesas} processos={processos}/>}
        {pagina==="relatorios" && <PaginaRelatorios processos={processos} parcelas={parcelas} clientes={clientes}/>}
        {pagina==="intimacoes" && <PaginaIntimacoes intimacoes={intimacoes} setIntimacoes={setIntimacoes} processos={processos} setProcessos={setProcessos} equipe={equipe} setTarefas={setTarefas} onAbrirProcesso={abrirProcesso}/>}
        {pagina==="importacao" && <PaginaImportacao processos={processos} setProcessos={setProcessos} clientes={clientes} setClientes={setClientes}/>}
        {pagina==="equipe" && <PaginaEquipe equipe={equipe} setEquipe={setEquipe}/>}
      </div>
      {prazoRapido && <ModalPrazoRapido
        tarefa={prazoRapido}
        processo={prazoRapido.procId ? processos.find(p=>String(p.id)===String(prazoRapido.procId)) : null}
        cliente={(()=>{
          if(prazoRapido.clienteId) return clientes.find(c=>String(c.id)===String(prazoRapido.clienteId));
          if(prazoRapido.procId){ const proc=processos.find(p=>String(p.id)===String(prazoRapido.procId)); if(proc?.clienteId) return clientes.find(c=>c.id===proc.clienteId); }
          return null;
        })()}
        onClose={()=>setPrazoRapido(null)}
        clientesTodos={clientes}
        onAbrirProcessoCompleto={()=>{ const p=processos.find(x=>String(x.id)===String(prazoRapido.procId)); if(p){ abrirProcesso(p); } setPrazoRapido(null); }}
        onConcluir={concluirTarefaGlobal}
      />}
    </div>
  );
}

function App(){
  const [user, setUser] = useState(null);
  const [checandoSessao, setCheandoSessao] = useState(true);

  React.useEffect(()=>{
    if(!sb){ setCheandoSessao(false); return; }
    sb.auth.getSession().then(({data})=>{
      setUser(data?.session?.user || null);
      setCheandoSessao(false);
    });
    const { data: listener } = sb.auth.onAuthStateChange((_event, session)=>{
      setUser(session?.user || null);
    });
    return () => { listener?.subscription?.unsubscribe(); };
  },[]);

  if(checandoSessao){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text2)",fontSize:13}}>Carregando…</div>;
  }
  if(!user){
    return <TelaLogin onLogin={setUser}/>;
  }
  return <AppPrincipal user={user}/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
